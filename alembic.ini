# Alembic configuration for Vargate Telemetry.
#
# `sqlalchemy.url` is intentionally blank: env.py reads `DATABASE_URL`
# from the environment so the same alembic.ini works for dev, test, and
# (eventually) prod overlays.

[alembic]
script_location = vargate_telemetry/migrations
prepend_sys_path = .
# `path_separator` is the alembic 1.13+ key (replaces version_path_separator
# for prepend_sys_path splitting); kept alongside version_path_separator so
# the same alembic.ini works on both old and new alembic.
path_separator = os
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
