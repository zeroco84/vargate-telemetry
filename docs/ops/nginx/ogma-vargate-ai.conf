# ═══════════════════════════════════════════════════════════════════════════
# ogma.vargate.ai — HOST nginx config (TLS via Let's Encrypt)
# ═══════════════════════════════════════════════════════════════════════════
#
# T4.5.5 — Ogma SPA + its backend API on a dedicated subdomain.
#
# Why a subdomain instead of a subpath under vargate.ai?
#   Cookie isolation. Ogma's session cookie (ogma_session) must NEVER
#   be readable by Tyr's dashboard at vargate.ai/dashboard/, and vice
#   versa. Browsers scope cookies by host — a subdomain gives clean
#   isolation; a subpath under vargate.ai would not.
#
#   ogma.vargate.ai/           → Ogma SPA (static, /var/www/ogma-dashboard)
#   ogma.vargate.ai/api/       → Ogma backend gateway (vargate-telemetry-gateway-1)
#                                via host port 127.0.0.1:8001
#   ogma.vargate.ai/auth/...   → React-router SPA route (handled by SPA fallback)
#

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name ogma.vargate.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ogma.vargate.ai;

    # Issued via certbot --nginx -d ogma.vargate.ai on first deploy.
    # Same Let's Encrypt account as the apex domain; renewals are
    # handled by the existing certbot timer/cron.
    ssl_certificate     /etc/letsencrypt/live/ogma.vargate.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ogma.vargate.ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── TLS hardening ─────────────────────────────────────────────────────
    ssl_stapling on;
    ssl_stapling_responder on;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── API proxy → Ogma gateway via host port 127.0.0.1:8001 ─────────────
    # The Telemetry stack publishes vargate-telemetry-gateway-1's :8000
    # to host :8001 via docker-compose.prod.yml's `ports: !override`
    # block (the matching companion change in this T4.5.5 patchset).
    # Same-origin from the SPA's POV — no CORS preflight expected, but
    # the OPTIONS short-circuit + Access-Control-* headers are kept
    # for parity with vargate-host.conf and to support local-dev
    # cross-origin testing.
    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 120s;

        add_header Access-Control-Allow-Origin "https://ogma.vargate.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── TM2 Phase B1: bridge JWT public key (RFC 8615 well-known) ─────────
    # Exact-match so this doesn't capture /.well-known/acme-challenge/.
    # Path is preserved into the gateway (no trailing slash on proxy_pass).
    # 24h Cache-Control is set by the gateway response, but a 5-min nginx
    # cache hint here lets reverse-proxy intermediaries (e.g. Cloudflare)
    # cache the JWK without round-tripping the gateway on every probe.
    # The MCP server fetches this once at boot + refreshes daily, so the
    # cost is minimal either way.
    location = /.well-known/ogma-public-key.json {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # ── TM2 Phase B2: Ogma SSO → MCP authorization callback bridge ────────
    # The MCP server's /authorize endpoint redirects the user-browser here.
    # Exact-match so it doesn't shadow the SPA's /auth/* React-router
    # routes (e.g., /auth/callback/google for the Google SSO post-return,
    # which is a SPA page that POSTs the code back to /api/auth/sso/...).
    location = /auth/mcp-bridge {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # ── Ogma SPA (static, with React-router fallback) ─────────────────────
    root /var/www/ogma-dashboard;
    index index.html;

    location / {
        # SPA fallback: any path that doesn't resolve to a real file
        # falls back to index.html, which then hands off to React
        # Router (e.g., /onboarding/connect, /auth/callback/google).
        try_files $uri $uri/ /index.html;

        # ── Cache-Control by file type ─────────────────────────────────────
        # Same discipline as the marketing vhost: 5m on HTML/CSS/JS so
        # deploys propagate within five minutes regardless of
        # Cloudflare state; 30d on heavy static assets. Hashed asset
        # bundles (e.g. /assets/index-XXXXXX.js) carry new filenames
        # each build, so a stale Cloudflare copy of the OLD bundle is
        # harmless — the new index.html points at the new hashes.
        #
        # Same `add_header` inheritance caveat as vargate-host.conf
        # applies: the security headers above on the server block
        # don't propagate into these nested blocks. Acceptable for
        # static assets; re-declare HSTS/etc. in these blocks if we
        # ever need them for asset responses.
        location ~* \.(html|css|js|map)$ {
            expires 5m;
            add_header Cache-Control "public, max-age=300, must-revalidate";
        }
        location ~* \.(png|jpg|jpeg|svg|webp|woff2|ico)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }
    }
}
