# ═══════════════════════════════════════════════════════════════════════════
# mcp.ogma.vargate.ai — HOST nginx config for the Ogma MCP server (TM1)
# ═══════════════════════════════════════════════════════════════════════════
#
# Companion to ogma-vargate-ai.conf (Tyr repo's nginx/conf.d/). Same
# host nginx, different vhost. Lives in docs/ops/nginx/ in the Ogma
# repo so the file ships with the TM1 sprint; Rick copies it to
# /etc/nginx/conf.d/ on first deploy.
#
# What this vhost serves:
#
#   mcp.ogma.vargate.ai/.well-known/oauth-*            → MCP server OAuth metadata
#   mcp.ogma.vargate.ai/register                       → DCR endpoint
#   mcp.ogma.vargate.ai/authorize                      → spike-mode auth code mint
#   mcp.ogma.vargate.ai/token                          → token exchange
#   mcp.ogma.vargate.ai/mcp/...                        → FastMCP streamable_http
#   mcp.ogma.vargate.ai/_health                        → healthcheck
#
# Upstream is host port 127.0.0.1:8002 — published by the
# `mcp-server` service in docker-compose.prod.yml. Same pattern as
# the Ogma gateway on :8001.
#
# CORS: claude.ai and claude.com are the only allowed origins. The
# MCP server also sets CORS via FastAPI middleware, but the nginx
# layer adds belt-and-braces so probe / OPTIONS traffic doesn't
# touch the app at all.

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name mcp.ogma.vargate.ai;

    # Let's Encrypt HTTP-01 challenge path. Certbot is run on first
    # deploy with `certbot --nginx -d mcp.ogma.vargate.ai`; the same
    # Let's Encrypt account + renewal timer that handle ogma.vargate.ai
    # pick this domain up too once the cert is issued.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name mcp.ogma.vargate.ai;

    ssl_certificate     /etc/letsencrypt/live/mcp.ogma.vargate.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.ogma.vargate.ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    ssl_stapling on;
    ssl_stapling_responder on;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;


    # ── Proxy → MCP server via host port 127.0.0.1:8002 ──────────────────
    #
    # All paths are proxied — there's no static SPA on this vhost.
    # The MCP server's FastAPI app handles routing internally between
    # the OAuth surface and the FastMCP-mounted streamable_http app.
    #
    # CORS: claude.ai + claude.com are the only callers. The MCP
    # server's CORSMiddleware whitelists the same origins; nginx
    # adds the headers here so OPTIONS preflights don't need to
    # round-trip into the app.
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The streamable_http transport can keep a connection alive
        # for a multi-message exchange. Buffering would defeat the
        # streaming intent; disable.
        proxy_buffering off;

        # MCP tool calls finish in <500ms by design (the handler
        # enqueues a Celery task and returns), but leave headroom
        # for slow handshake / metadata fetches.
        proxy_read_timeout 120s;

        # ── CORS ──────────────────────────────────────────────────────────
        # FastMCP probes from the Claude web client are cross-origin.
        # Match exactly on Origin so we never accidentally allow
        # anything beyond claude.ai / claude.com.
        set $cors_allow_origin "";
        if ($http_origin ~* ^https://(claude\.ai|claude\.com)$) {
            set $cors_allow_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_allow_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Mcp-Protocol-Version" always;
        add_header Access-Control-Allow-Credentials "false" always;
        add_header Access-Control-Max-Age "3600" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
