openapi: 3.1.0

info:
  title: Vargate Ogma API
  version: "0.1.0"
  description: |
    Public HTTP contract for Ogma (the Vargate Telemetry product).

    This file is the contract source of truth — the backend implements
    against it, the frontend generates TypeScript types from it. See
    `openapi/README.md` for the contract-first change order.

    The shape covers the T4 onboarding flow:
      1. SSO sign-in (Google / Microsoft callback)
      2. Validate the supplied Anthropic admin key
      3. Pick a region
      4. Start the 90-day backfill
      5. Poll backfill status until done

    Plus `/me` for "who am I currently signed in as."

    Subsequent sprints (T5+) extend this file additively — adding new
    paths, new schemas, new tags. Breaking changes (renames, removed
    fields) require a major version bump and a deprecation window.
  contact:
    name: Vargate engineering
    email: engineering@vargate.ai
  license:
    name: Business Source License 1.1
    url: https://github.com/zeroco84/vargate-telemetry/blob/main/LICENSE

servers:
  - url: /api
    description: Same-origin (nginx routes /api/ to the FastAPI gateway).

tags:
  - name: auth
    description: SSO sign-in flows.
  - name: onboarding
    description: First-run flow that gets a paying customer to "data flowing" in <60 s.
  - name: me
    description: The authenticated caller's identity.
  - name: budgets
    description: |
      CFO-facing budget caps + alerts. A budget targets one scope
      (api_key | workspace | model | tenant) and one period
      (daily | weekly | monthly). The evaluator runs every 15
      minutes and fires an alert at 70 / 85 / 100 % of the cap,
      dedup'd to at-most-once-per-period-per-threshold.
  - name: users
    description: |
      Cross-surface user view — the unique-to-Ogma analytic. One
      person shows up as disconnected identities across Anthropic's
      surfaces (Code Analytics actor email, MCP chat user, API key);
      Ogma stitches them via user_aliases and rolls activity up per
      person. Includes manual alias mapping for unmatched identities.

# ───────────────────────────────────────────────────────────────────────────
# Security schemes
# ───────────────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ogma_session
      description: |
        HttpOnly Secure cookie set by `/api/auth/sso/*/callback` on
        successful sign-in. Carries the short-lived JWT. Default
        auth scheme for browser callers.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        `Authorization: Bearer <JWT>`. Programmatic callers (CI
        scripts, integration tests) that can't use cookies. The JWT
        format is identical to the cookie payload.

  # ─────────────────────────────────────────────────────────────────────────
  # Reusable schemas
  # ─────────────────────────────────────────────────────────────────────────

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable code (snake_case). Clients branch on this, not on `message`.
          examples: ["validation_error", "invalid_admin_key", "tenant_not_found", "unauthenticated"]
        message:
          type: string
          description: Human-readable, English. Display verbatim or use for diagnostics.
          examples: ["Anthropic rejected the supplied admin key as invalid."]
        details:
          type: array
          description: Per-field validation breakdown when applicable. Empty / omitted for non-validation errors.
          items:
            type: object
            required: [field, issue]
            properties:
              field:
                type: string
                examples: ["admin_key"]
              issue:
                type: string
                examples: ["must start with 'sk-ant-admin01-'"]
      examples:
        - code: validation_error
          message: One or more fields failed validation.
          details:
            - field: admin_key
              issue: "must start with 'sk-ant-admin01-'"

    SsoCallbackRequest:
      type: object
      required: [code, state]
      description: OAuth 2.0 authorization-code callback parameters.
      properties:
        code:
          type: string
          description: The authorization code issued by the provider.
        state:
          type: string
          description: |
            The CSRF token the frontend set before redirecting to the provider.
            Backend verifies it matches the value stored in the short-lived
            state cookie.

    SsoCallbackResponse:
      type: object
      required: [user_id, email]
      description: |
        Returned alongside the `Set-Cookie: ogma_session=...` response
        header. The session cookie is the durable artifact; this body
        is for clients that want to render "signed in as ..." without
        a follow-up `/me` round-trip.
      properties:
        user_id:
          type: string
          description: Stable internal id, NOT the SSO provider's `sub`.
          examples: ["usr_01HXYZ..."]
        email:
          type: string
          format: email
          examples: ["alice@example.com"]
        name:
          type: string
          description: Provider-supplied display name. May be absent.

    ValidateKeyRequest:
      type: object
      required: [admin_key]
      properties:
        admin_key:
          type: string
          description: Anthropic admin API key (begins `sk-ant-admin01-`).
          minLength: 30
          examples: ["sk-ant-admin01-abc123..."]

    KeyCapabilities:
      type: object
      required: [admin_api, activity_feed, content_capture, code_analytics]
      description: |
        Which Anthropic capabilities the supplied admin key actually
        unlocks. Each bool is determined by a read-only probe against
        the corresponding endpoint family. The UI renders this as a
        per-capability matrix so the user knows up-front what kind of
        data the dashboard will surface.

        T5.3 replaced the earlier `compliance_api` single-bool with
        two distinct booleans: `activity_feed` (reachable by Admin
        API keys with `read:compliance_activities` scope) and
        `content_capture` (requires a separate Compliance Access Key
        created in claude.ai by an Enterprise Primary Owner). The
        previous single-bool was misleading — it returned True on
        every Admin key with admin scope, but actual content capture
        is gated behind plan tier + a second key type.
      properties:
        admin_api:
          type: boolean
          description: |
            Can call `/v1/organizations/usage_report/messages`. The
            Admin API surface used by T3+ for usage metering, member
            enumeration, and workspace listing.
        activity_feed:
          type: boolean
          description: |
            Can call `/v1/compliance/activities`. T5.3 ingests
            authentication / chat-created / file-uploaded / admin /
            platform event metadata into `telemetry_records` every 15
            minutes. Reachable by Admin API keys carrying the
            `read:compliance_activities` scope. False if the key (or
            the org's plan) doesn't include Activity Feed access.
        content_capture:
          type: boolean
          description: |
            Can pull underlying chat messages, files, and project
            content (`/v1/compliance/apps/chats/*`). Requires a
            **Compliance Access Key** (`sk-ant-api01-...`) created in
            claude.ai by an Enterprise Primary Owner — NOT the same
            as the Admin API key (`sk-ant-admin01-...`) that today's
            onboarding collects. T5.3 always returns `false` here;
            a future sprint adds the Compliance Access Key onboarding
            step. The UI renders this row as
            "Enable later — requires Compliance Access Key".
        code_analytics:
          type: boolean
          description: |
            Has Claude Code Analytics access. T5.4 will land the real
            probe; today this is always `false`.

    MeCapabilities:
      type: object
      required:
        [admin_api, activity_feed, content_capture, code_analytics, mcp_connector]
      description: |
        The tenant's current capability snapshot (`GET /me/capabilities`).
        Same 5-bool shape as `KeyCapabilities`, but reflects what data the
        tenant HAS now (telemetry-row / sealed-key presence) rather than
        what a freshly-probed admin key COULD unlock. `content_capture`
        (TM5 T5.1) is true once a Compliance Access Key is sealed.
      properties:
        admin_api:
          type: boolean
        activity_feed:
          type: boolean
        content_capture:
          type: boolean
        code_analytics:
          type: boolean
        mcp_connector:
          type: boolean

    McpStatus:
      type: object
      required: [configured, events_count]
      description: |
        MCP-connector ingest state for the tenant
        (`GET /onboarding/mcp-status`). Capability lights up by USAGE,
        not registration — `configured` is true once an `mcp` telemetry
        row exists in the last 90 days.
      properties:
        configured:
          type: boolean
          description: True iff ≥1 `source_api='mcp'` record in the last 90 days.
        first_event_at:
          type: string
          format: date-time
          nullable: true
          description: Earliest mcp record timestamp; null if none yet.
        events_count:
          type: integer
          description: Total mcp records in the last 90 days.

    ValidateKeyResponse:
      type: object
      required: [org_name, capabilities]
      properties:
        org_name:
          type: string
          description: |
            The Anthropic org name the key belongs to, as returned by
            `list_workspaces()`. Displayed in the UI so the user can
            confirm they pasted the right key.
          examples: ["Acme Corp"]
        capabilities:
          $ref: '#/components/schemas/KeyCapabilities'

    ComplianceKeyRequest:
      type: object
      required: [compliance_key]
      properties:
        compliance_key:
          type: string
          description: |
            Anthropic Compliance Access Key (begins `sk-ant-api01-`),
            created in claude.ai by an Enterprise owner. Distinct from
            the Admin API key (`sk-ant-admin01-`). Must carry BOTH
            `read:compliance_org_data` and `read:compliance_user_data`
            scopes — content capture enumerates organizations → users →
            chats, which spans both scopes (TM5 T5.1).
          minLength: 20
          examples: ["sk-ant-api01-..."]

    ComplianceKeyResponse:
      type: object
      required: [content_capture]
      properties:
        content_capture:
          type: boolean
          description: |
            True once the key is validated + sealed. Mirrors the
            `content_capture` bool in `GET /me/capabilities`, which
            flips True for the tenant the moment the key is sealed.
        org_name:
          type: string
          nullable: true
          description: |
            Name of the first organization the key sees, echoed back as
            a confirmation. Null if the key authenticates but the org
            tree is empty.
          examples: ["Acme Enterprise"]

    ChatSummary:
      type: object
      required:
        [chat_id, message_count, first_message_at, last_message_at, deleted, purged]
      description: |
        One captured chat (TM5 T5.3), aggregated from its per-message
        `compliance_content` records. Metadata only — message text is
        fetched + decrypted by the per-chat detail endpoint.
      properties:
        chat_id:
          type: string
        chat_name:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        user_email:
          type: string
          nullable: true
        message_count:
          type: integer
        first_message_at:
          type: string
          format: date-time
        last_message_at:
          type: string
          format: date-time
        deleted:
          type: boolean
          description: |
            True if the chat was soft-deleted in claude.ai (still
            captured, with the flag). Hard-deleted chats never appear.
        purged:
          type: boolean
          description: |
            True if the chat's content was purged via Ogma (TM6 T6.1 —
            per-chat delete / per-user DSR that covers all its messages /
            tenant crypto-shred). Distinct from `deleted` (claude.ai's own
            soft-delete). The chain records remain; the blobs are gone.

    ChatListResponse:
      type: object
      required: [chats, truncated]
      properties:
        chats:
          type: array
          items:
            $ref: '#/components/schemas/ChatSummary'
        truncated:
          type: boolean
          description: |
            True when the tenant has more chats than the capped list
            returned (no silent truncation — the UI says "most recent N").

    RedactionFinding:
      type: object
      required: [type, count]
      description: |
        What PII a message contains (TM6 T6.3) — counts only, never the
        matched values.
      properties:
        type:
          type: string
          description: "PII type: email / phone / ssn / credit_card / api_key / ip_address."
        count:
          type: integer

    ContentMessage:
      type: object
      required: [record_id, message_id, role, occurred_at, purged]
      properties:
        record_id:
          type: string
        message_id:
          type: string
        role:
          type: string
          description: "`user` or `assistant`."
        occurred_at:
          type: string
          format: date-time
        content:
          type: string
          nullable: true
          description: |
            The message text. PII is masked by default (T6.3); the reveal
            endpoint returns it unmasked. Null if the blob couldn't be
            decrypted (tamper / missing / transport) or the message was
            purged.
        content_size_bytes:
          type: integer
          nullable: true
        purged:
          type: boolean
          description: |
            True if this message's content was purged via Ogma; `content`
            is null because the blob is gone (the chain record remains).
        redacted:
          type: boolean
          description: True if `content` is currently masked (PII present, not revealed).
        redactions:
          type: array
          description: PII types + counts detected in the message.
          items:
            $ref: '#/components/schemas/RedactionFinding'

    ChatDetailResponse:
      type: object
      required: [chat_id, deleted, purged, messages]
      properties:
        chat_id:
          type: string
        chat_name:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        user_email:
          type: string
          nullable: true
        deleted:
          type: boolean
        purged:
          type: boolean
          description: |
            Whole-chat purge tombstone — true when every message was
            deleted or the tenant was crypto-shredded.
        purge_reason:
          type: string
          nullable: true
          description: Reason from the most recent covering deletion event.
        purged_at:
          type: string
          format: date-time
          nullable: true
        revealed:
          type: boolean
          description: |
            True when this response carries UNMASKED content (the reveal
            endpoint logged a content_reveal event to produce it).
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ContentMessage'

    DeletionRequest:
      type: object
      required: [reason]
      description: |
        TM6 T6.1 — a mandatory reason for a content deletion (recorded in
        the `content_deletion` chain event for the audit trail).
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500

    DeletionResult:
      type: object
      required: [scope, deleted, already_deleted]
      properties:
        scope:
          type: string
          description: "`chat` or `user`."
        deleted:
          type: integer
          description: Records whose deletion event was newly appended.
        already_deleted:
          type: integer
          description: Records already deleted on a prior call (idempotent).

    TenantShredRequest:
      type: object
      required: [reason, confirm_tenant_id]
      description: |
        TM6 T6.1 — terminal per-tenant crypto-shred (offboarding).
        `confirm_tenant_id` must equal the caller's own tenant_id.
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
        confirm_tenant_id:
          type: string
          minLength: 1

    TenantShredResult:
      type: object
      required: [dek_destroyed, event_appended]
      properties:
        dek_destroyed:
          type: boolean
        event_appended:
          type: boolean

    Region:
      type: string
      enum: [us, eu]
      description: |
        Data-residency region. Once set on a tenant it MUST NOT change —
        the first anchor is region-bound. Future regions (apac, etc.)
        will be added here.

    SelectRegionRequest:
      type: object
      required: [region, admin_key]
      properties:
        region:
          $ref: '#/components/schemas/Region'
        admin_key:
          type: string
          description: |
            The Anthropic admin key, previously validated by
            `/onboarding/validate-key`. Sealed into
            `encrypted_secrets` inside the same transaction that
            creates the tenant row, so a mid-flow failure never
            leaves a sealed key without a tenant or vice versa.
          minLength: 30

    Tenant:
      type: object
      required: [tenant_id, region]
      properties:
        tenant_id:
          type: string
          description: Stable per-tenant identifier (matches `tenants.tenant_id`).
          examples: ["tnt_01HXYZ..."]
        region:
          $ref: '#/components/schemas/Region'

    StartBackfillRequest:
      type: object
      required: [tenant_id]
      properties:
        tenant_id:
          type: string
        days:
          type: integer
          description: |
            How many days of history to pull. Defaults to 90 (the
            T3.6 backfill default). Bounded to avoid runaway pulls.
          minimum: 1
          maximum: 365
          default: 90

    StartBackfillResponse:
      type: object
      required: [task_id]
      properties:
        task_id:
          type: string
          description: |
            Celery task id. Pass to `GET /onboarding/backfill-status/{task_id}`
            to poll progress.
          examples: ["6f8b9c..."]

    BackfillState:
      type: string
      enum: [PENDING, STARTED, PROGRESS, SUCCESS, FAILURE]
      description: |
        Celery task state.

          - PENDING  — queued, worker has not picked it up yet.
          - STARTED  — worker accepted the task but has not yet
            crossed the first chunk boundary.
          - PROGRESS — at least one 7-day chunk has completed; the
            `meta` carries chunks_processed / inserted / deduped.
            The frontend polls and re-renders the progress bar on
            every PROGRESS tick.
          - SUCCESS  — done. The task return value carries the final
            totals; the response surfaces them via the same fields.
          - FAILURE  — exhausted retries. `error` carries a short
            human-readable summary (class name + message).

    BackfillStatus:
      type: object
      required: [state]
      properties:
        state:
          $ref: '#/components/schemas/BackfillState'
        chunks_processed:
          type: integer
          minimum: 0
          description: |
            Number of 7-day chunks the backfill has completed. Set
            on PROGRESS / SUCCESS; absent or 0 in PENDING / STARTED.
        inserted:
          type: integer
          minimum: 0
          description: Total telemetry_records rows inserted so far.
        deduped:
          type: integer
          minimum: 0
          description: |
            Buckets that hit the (tenant_id, source_api, external_id)
            UNIQUE constraint — expected when the backfill resumes
            after a partial run.
        error:
          type: string
          description: |
            Present only on FAILURE. Truncated to 1000 chars for
            display safety. Format: `<ExceptionClass>: <message>`.

    Me:
      type: object
      required: [user_id, email, tenants]
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        sso_provider:
          type: string
          enum: [google, microsoft]
        tenants:
          type: array
          description: |
            All tenants this user has access to. Empty array means the
            user is signed in but hasn't completed onboarding yet
            (between SSO callback and `/onboarding/select-region`).
          items:
            $ref: '#/components/schemas/Tenant'
        role:
          type: string
          enum: [admin, member]
          nullable: true
          description: |
            TM4: the caller's role in their bound tenant ('admin' or
            'member'), or null when not yet bound. Admins may write
            budgets, map identities to users, and change roles; members
            are read + self-service. Advisory for UI gating only — the
            backend enforces the gate independently.

    # ─────────────────────────────────────────────────────────────────────
    # Sessions (T5.5) — first dashboard view of ingested content.
    # A Session is one (date, actor) tuple aggregated across the
    # `code_analytics` and `compliance_activities` streams. Admin API
    # usage records are bucket-grain, not actor-grain, so they don't
    # roll up into Sessions.
    # ─────────────────────────────────────────────────────────────────────

    SessionActor:
      type: object
      required: [type, key]
      description: |
        The principal behind a Session. `type` is the vendor's actor
        discriminator (`user_actor` / `api_actor` / etc.); `key` is the
        natural identifier — email for users, api_key_name (or
        api_key_id) for keys. Forward-compatible with novel actor
        types via `extra="allow"` semantics on the underlying records.
      properties:
        type:
          type: string
          examples: ["user_actor", "api_actor"]
        key:
          type: string
          examples: ["dev@example.com", "ci-deploy-key"]

    SessionSummary:
      type: object
      required:
        - session_id
        - date
        - actor
        - source_apis
        - event_count
        - event_count_by_source
        - first_seen
        - last_seen
      description: |
        One row in the Sessions list. `session_id` is opaque (base64url
        of `{date}|{actor_type}|{actor_key}`); pass it back to
        `/sessions/{session_id}` for the detail view.
      properties:
        session_id:
          type: string
          description: Opaque, URL-safe identifier. Stable per (date, actor).
        date:
          type: string
          format: date
          description: UTC date of the session.
        actor:
          $ref: '#/components/schemas/SessionActor'
        source_apis:
          type: array
          description: |
            Which ingest streams contributed records to this session
            (`code_analytics`, `compliance_activities`, `mcp`). TM2
            added MCP as a contributing source — see
            `event_count_by_source` for the per-source breakdown.
          items:
            type: string
        event_count:
          type: integer
          description: Total underlying records folded into this session.
        event_count_by_source:
          type: object
          description: |
            TM2 Phase E1 — per-source breakdown. Keys are the
            `source_api` values in `source_apis`; values are how many
            events each contributed. Sums to `event_count`. Frontend
            renders the per-source badges from this map.
          additionalProperties:
            type: integer
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time

    SessionListResponse:
      type: object
      required: [sessions, next_cursor]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor for the next page. `null` when no more.
            Pass back as the `cursor` query param.

    SessionRecord:
      type: object
      required: [record_id, source_api, occurred_at, external_id, metadata]
      description: |
        One underlying audit-chain record inside a Session. T5.5 returns
        all records folded into the session in chain order. The
        `content` field is populated when the record carries a MinIO
        content blob (T5.1+); T5.6's Compliance Content path is the
        first ingest that will surface non-null content here.
      properties:
        record_id:
          type: string
          format: uuid
        source_api:
          type: string
        record_type:
          type: string
        occurred_at:
          type: string
          format: date-time
        external_id:
          type: string
          description: Vendor-side stable id (or synthesized natural key).
        metadata:
          type: object
          description: |
            The full vendor record JSON, including type-specific extra
            fields. T5.4's flat-model-with-extra-allow ingest pattern
            means future fields land here without an API change.
          additionalProperties: true
        content_size_bytes:
          type: integer
          nullable: true
          description: Plaintext size of the content blob, if any.
        content:
          type: string
          nullable: true
          description: |
            Plaintext content blob (T5.6+). Decrypted server-side from
            MinIO using the tenant DEK if `content_ref` is non-null
            on the underlying record. `null` for records without an
            attached blob (the common case in T5.5).

    SessionDetailResponse:
      type: object
      required: [session_id, date, actor, records]
      properties:
        session_id:
          type: string
        date:
          type: string
          format: date
        actor:
          $ref: '#/components/schemas/SessionActor'
        records:
          type: array
          items:
            $ref: '#/components/schemas/SessionRecord'

    UsageRow:
      type: object
      required:
        - date
        - input_tokens
        - output_tokens
        - cache_read_tokens
        - cache_creation_tokens
        - web_search_requests
      description: |
        One (date, workspace_id, api_key_id, model) breakdown of
        Admin API token usage. TM3 Phase A4 extended the connector's
        default `group_by` to include `api_key_id`, so every new
        daily bucket now produces one row per (model, workspace,
        api_key) triple. Pre-TM3 records (T5.5.6 era) have a null
        `api_key_id` / `api_key_name`; pre-T5.5.6 aggregate rows have
        null `model` / `workspace_id` too. The view renders `—` for
        every null on legacy rows; `estimated_cost_usd` is `null`
        (unrepresentable) when `model` is null.
      properties:
        date:
          type: string
          format: date
          description: UTC date of the bucket.
        workspace_id:
          type: string
          nullable: true
          description: |
            Anthropic workspace identifier. `null` for org-level
            usage (no workspace bucketing) or for pre-T5.5.6 records
            ingested without `group_by`.
        workspace_name:
          type: string
          nullable: true
          description: |
            Human-friendly name resolved from the `workspaces` side
            table (T5.5.6). `null` when `workspace_id` is null or
            when the workspace hasn't been synced yet (the backfill
            pulls the workspaces list at start time; missing entries
            usually clear on the next steady-state pull).
        api_key_id:
          type: string
          nullable: true
          description: |
            Anthropic API key identifier (e.g. `apikey_01HABC...`).
            `null` for pre-TM3 records ingested before
            `group_by=[api_key_id]` landed, or for buckets that
            Anthropic did not attribute to a single key.
        api_key_name:
          type: string
          nullable: true
          description: |
            Human-friendly name resolved from the `api_keys` side
            table (TM3 Phase A4). The usage report does NOT include
            the key name — a parallel fetch to
            `/v1/organizations/api_keys` populates this table at
            backfill + pull time. `null` when `api_key_id` is null
            or when the key hasn't been synced yet; the UI falls
            back to the raw ID in that case.
        model:
          type: string
          nullable: true
          description: |
            Anthropic model identifier
            (e.g. `claude-sonnet-4-5-20250929`). `null` for pre-T5.5.6
            records ingested without `group_by`.
        input_tokens:
          type: integer
          format: int64
          description: |
            Fresh input tokens. Maps to Anthropic's
            `uncached_input_tokens` in the group_by'd response;
            equivalent to the old aggregate response's `input_tokens`.
        output_tokens:
          type: integer
          format: int64
        cache_read_tokens:
          type: integer
          format: int64
          description: Tokens read from prompt cache.
        cache_creation_tokens:
          type: integer
          format: int64
          description: |
            Tokens written to prompt cache. With T5.5.6's group_by'd
            response Anthropic emits a nested
            `cache_creation.{ephemeral_5m, ephemeral_1h}` shape; this
            field is the sum of those (pre-T5.5.6 records may also
            populate this from the flat `cache_creation_input_tokens`).
        web_search_requests:
          type: integer
          format: int64
          description: |
            Count of Anthropic server-side web_search tool invocations
            in the bucket. Anthropic bills these separately from
            tokens; surfacing them avoids underreporting cost.
        estimated_cost_usd:
          type: string
          nullable: true
          description: |
            Per-row cost in USD as a decimal string with 6 fractional
            digits (e.g. `"1.142214"`). Computed from `model` × token
            counts via the versioned rate card at the bucket's
            `occurred_at`. `null` when `model` is null (legacy
            aggregate row) or when the model isn't in the rate card
            (a never-seen-before family). UI renders `null` as `—`
            — **never faked**. A wrong dollar figure is worse than
            no figure.

    UsageTotals:
      type: object
      required:
        - input_tokens
        - output_tokens
        - cache_read_tokens
        - cache_creation_tokens
        - web_search_requests
        - row_count
        - rows_without_cost
      description: |
        Aggregates over the **full filtered set** (not just the
        current page). Computing this client-side from page rows
        would silently undercount on multi-page results.
      properties:
        input_tokens:
          type: integer
          format: int64
        output_tokens:
          type: integer
          format: int64
        cache_read_tokens:
          type: integer
          format: int64
        cache_creation_tokens:
          type: integer
          format: int64
        web_search_requests:
          type: integer
          format: int64
        row_count:
          type: integer
          format: int64
          description: |
            Total rows across all pages. UI uses this to render
            "showing 50 of 137" affordance.
        total_cost_usd:
          type: string
          nullable: true
          description: |
            Sum of per-row `estimated_cost_usd` across the filtered
            set, as a 2-decimal USD string (e.g. `"47.20"`). `null`
            when zero rows had a computable cost. Rows with a `null`
            cost (model=null or unknown) DON'T contribute and are
            counted in `rows_without_cost`.
        rows_without_cost:
          type: integer
          format: int64
          description: |
            Count of rows in the filtered set whose
            `estimated_cost_usd` was `null` (model=null or unknown).
            When > 0, `total_cost_usd` is a **floor**, not an exact
            figure — the UI renders "≥ $X" in that case so customers
            know the displayed total understates real spend.

    UsageListResponse:
      type: object
      required: [rows, totals, next_cursor]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/UsageRow'
        totals:
          $ref: '#/components/schemas/UsageTotals'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor for the next page. `null` when no more.
            Pass back as the `cursor` query param.

    CacheModelStat:
      type: object
      required: [model, severity, recommendation]
      description: Per-model cache-efficiency stats over the window (TM5 T5.5).
      properties:
        model:
          type: string
        uncached_input_tokens:
          type: integer
        cache_read_tokens:
          type: integer
        cache_creation_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_hit_rate:
          type: number
          nullable: true
          description: "`cache_read / (cache_read + cache_creation)`; null if no cache activity."
        severity:
          type: string
          enum: [ok, info, warn]
        recommendation:
          type: string

    CacheRecommendationsResponse:
      type: object
      required: [since, until, models]
      properties:
        since:
          type: string
          format: date
        until:
          type: string
          format: date
        overall_hit_rate:
          type: number
          nullable: true
          description: Tenant-wide `read / (read + creation)`; null if no cache activity.
        models:
          type: array
          items:
            $ref: '#/components/schemas/CacheModelStat'

    # ───────────────────────────────────────────────────────────────────────
    # Budgets (TM3 Phase B)
    # ───────────────────────────────────────────────────────────────────────

    BudgetScopeKind:
      type: string
      enum: [api_key, workspace, model, tenant]
      description: |
        What the budget caps. `tenant` is everything; the others
        slice by Anthropic API key id / workspace id / model name.

    BudgetPeriod:
      type: string
      enum: [daily, weekly, monthly]
      description: |
        Reset cadence. UTC-aligned: daily = UTC midnight,
        weekly = ISO Monday, monthly = 1st of UTC month.

    AlertRecipients:
      type: object
      description: |
        Per-channel alert recipients (TM5 T5.4). Email is the default
        channel; Slack incoming-webhook URLs and PagerDuty Events API v2
        routing keys fire only when populated. Unknown channel keys are
        rejected (422). Stored as the budget's `alert_recipients` JSONB.
      additionalProperties: false
      properties:
        email:
          type: array
          default: []
          items:
            type: string
            format: email
        slack_webhook:
          type: array
          default: []
          items:
            type: string
            description: Slack incoming-webhook URL (https://hooks.slack.com/services/...).
        pagerduty_key:
          type: array
          default: []
          items:
            type: string
            description: PagerDuty Events API v2 routing (integration) key.

    Budget:
      type: object
      required:
        - id
        - name
        - scope_kind
        - period
        - threshold_usd
        - alert_recipients
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 256
        scope_kind:
          $ref: '#/components/schemas/BudgetScopeKind'
        scope_value:
          type: string
          nullable: true
          maxLength: 256
          description: |
            api_key_id / workspace_id / model name. NULL only when
            `scope_kind == tenant`. The view layer resolves
            workspace and api_key ids to human names via the
            existing side tables.
        scope_label:
          type: string
          nullable: true
          description: |
            TM4: resolved human name for the scope target (workspace /
            api_key), from the side tables. NULL for tenant scope or an
            id the sync hasn't seen yet — the UI falls back to
            scope_value. Populated on list + detail; null on
            create/patch responses.
        period:
          $ref: '#/components/schemas/BudgetPeriod'
        threshold_usd:
          type: string
          description: |
            USD cap as a string-encoded Decimal (e.g. `"500.00"`).
            Always positive; the CHECK constraint at the DB
            forbids ≤ 0.
        alert_recipients:
          $ref: '#/components/schemas/AlertRecipients'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by_user_id:
          type: string
          format: uuid
          nullable: true
          description: |
            The user who created the budget (from the JWT subject).
            Nulled if that user is later deleted (ON DELETE SET NULL).

    BudgetCreate:
      type: object
      required: [name, scope_kind, period, threshold_usd]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        scope_kind:
          $ref: '#/components/schemas/BudgetScopeKind'
        scope_value:
          type: string
          nullable: true
          maxLength: 256
        period:
          $ref: '#/components/schemas/BudgetPeriod'
        threshold_usd:
          type: string
          description: USD cap as a string-encoded Decimal, > 0.
        alert_recipients:
          $ref: '#/components/schemas/AlertRecipients'

    BudgetUpdate:
      type: object
      description: |
        Only the supplied fields are touched. Immutable axes
        (scope_kind, scope_value, period) are NOT in the update
        body — to change them, delete the budget and create a new
        one. Empty body returns 400 (no_fields_to_update).
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        threshold_usd:
          type: string
          description: USD cap as a string-encoded Decimal, > 0.
        alert_recipients:
          $ref: '#/components/schemas/AlertRecipients'

    BudgetDetail:
      allOf:
        - $ref: '#/components/schemas/Budget'
        - type: object
          required:
            - current_period_start
            - current_period_end
            - current_spend_usd
            - current_ratio
          properties:
            current_period_start:
              type: string
              format: date
            current_period_end:
              type: string
              format: date
            current_spend_usd:
              type: string
              description: |
                Sum of admin-API usage in the current period
                matching the budget's scope, as a string Decimal
                (e.g. `"73.14"`). Quantized to 2 decimals.
            current_ratio:
              type: string
              description: |
                current_spend_usd / threshold_usd, quantized to 4
                decimals. Can exceed 1.0 (over budget).
            current_threshold_crossed:
              type: string
              nullable: true
              description: |
                Highest threshold the current ratio has crossed
                (0.70 / 0.85 / 1.00). NULL when the ratio is
                below the lowest threshold. UI uses this for the
                progress bar's color tier.

    BudgetListResponse:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          description: |
            Detail-shaped rows — each carries current-period spend +
            ratio + crossed threshold so the roster renders a live
            progress bar, not just static config.
          items:
            $ref: '#/components/schemas/BudgetDetail'

    BudgetAlertEvent:
      type: object
      required:
        - id
        - budget_id
        - budget_name
        - period_start
        - threshold_crossed
        - current_spend_usd
        - fired_at
      properties:
        id:
          type: string
          format: uuid
        budget_id:
          type: string
          format: uuid
        budget_name:
          type: string
          description: Joined from `budgets` for the alert list view.
        period_start:
          type: string
          format: date
        threshold_crossed:
          type: string
          description: One of `0.70`, `0.85`, `1.00`.
        current_spend_usd:
          type: string
          description: |
            The spend figure that fired the alert (as a string
            Decimal). Snapshot at fire time; the budget's
            current spend may diverge later as more usage
            arrives.
        fired_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        acknowledged_by_user_id:
          type: string
          format: uuid
          nullable: true

    BudgetAlertListResponse:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/BudgetAlertEvent'

    # ───────────────────────────────────────────────────────────────────────
    # Cross-surface users (TM3 Phase C)
    # ───────────────────────────────────────────────────────────────────────

    UserSurfaceStat:
      type: object
      required: [user_id, email, role, surfaces, events_7d]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [admin, member]
          description: |
            TM4: this user's role in the tenant. Drives the role chip
            and the admin-only promote/demote control in the roster.
        surfaces:
          type: array
          items:
            type: string
          description: |
            Distinct source_api values this user is active on
            (code_analytics, mcp, compliance_activities). The
            frontend maps these to surface labels (Claude Code,
            Claude (chat), Admin event) via sourceLabels.
        events_7d:
          type: integer
          format: int64
          description: Events attributed to this user in the last 7 days.
        spend_7d_usd:
          type: string
          nullable: true
          description: |
            Estimated 7-day spend (string Decimal). Derived ONLY
            from MCP records (the sole per-user priceable source —
            Admin usage is key-level, Code Analytics has no token
            shape). `null` when the user has no priceable activity;
            the UI renders `—`, never a faked $0.
        last_active:
          type: string
          format: date-time
          nullable: true

    UnmappedAlias:
      type: object
      required: [source_api, source_identifier, event_count]
      properties:
        source_api:
          type: string
        source_identifier:
          type: string
          description: |
            The actor identifier (api_key_name, or an email with no
            matching Ogma user) that couldn't be auto-matched. The
            admin maps it to a user via POST /users/{id}/aliases.
        event_count:
          type: integer
          format: int64
        last_seen:
          type: string
          format: date-time
          nullable: true

    UserListResponse:
      type: object
      required: [users, unmapped]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserSurfaceStat'
        unmapped:
          type: array
          items:
            $ref: '#/components/schemas/UnmappedAlias'

    HeatmapCell:
      type: object
      required: [day, source_api, count]
      properties:
        day:
          type: string
          format: date
        source_api:
          type: string
        count:
          type: integer
          format: int64

    SpendTrendPoint:
      type: object
      required: [day, source_api, spend_usd]
      properties:
        day:
          type: string
          format: date
        source_api:
          type: string
        spend_usd:
          type: string
          description: String Decimal — per-day MCP spend.

    UserAlias:
      type: object
      required: [source_api, source_identifier, auto_matched]
      properties:
        source_api:
          type: string
        source_identifier:
          type: string
        auto_matched:
          type: boolean
          description: |
            true = email-equality auto-match; false = admin manually
            linked (protected from auto-match overwrite).

    UserRecentRecord:
      type: object
      required: [record_id, source_api, occurred_at]
      properties:
        record_id:
          type: string
        source_api:
          type: string
        occurred_at:
          type: string
          format: date-time
        kind:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true

    TopicCount:
      type: object
      required: [topic, count]
      properties:
        topic:
          type: string
        count:
          type: integer

    UserDetailResponse:
      type: object
      required:
        - user_id
        - email
        - joined_at
        - surfaces
        - aliases
        - heatmap
        - spend_trend
        - recent
        - top_topics
        - topics_classified
        - topics_total
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        joined_at:
          type: string
          format: date-time
        surfaces:
          type: array
          items:
            type: string
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/UserAlias'
        heatmap:
          type: array
          items:
            $ref: '#/components/schemas/HeatmapCell'
        spend_trend:
          type: array
          items:
            $ref: '#/components/schemas/SpendTrendPoint'
        recent:
          type: array
          items:
            $ref: '#/components/schemas/UserRecentRecord'
        top_topics:
          type: array
          items:
            $ref: '#/components/schemas/TopicCount'
        topics_classified:
          type: integer
        topics_total:
          type: integer

    AliasMapRequest:
      type: object
      required: [source_api, source_identifier]
      properties:
        source_api:
          type: string
          minLength: 1
          maxLength: 32
        source_identifier:
          type: string
          minLength: 1
          maxLength: 320

    RoleUpdateRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, member]
          description: TM4 — the role to assign to the target user.

    RoleUpdateResponse:
      type: object
      required: [user_id, role]
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, member]

  # ─────────────────────────────────────────────────────────────────────────
  # Reusable response bodies — every 4xx / 5xx is an ErrorResponse.
  # ─────────────────────────────────────────────────────────────────────────

  responses:
    BadRequest:
      description: Validation failure or malformed input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthenticated:
      description: Missing or invalid session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but lacks permission for this tenant or resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The named resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unhandled server error. Body is safe-to-display; details land in server logs.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# ───────────────────────────────────────────────────────────────────────────
# Default security: every endpoint requires either the cookie or a Bearer
# token. Endpoints that don't (the SSO callbacks) override with `security: []`.
# ───────────────────────────────────────────────────────────────────────────

security:
  - cookieAuth: []
  - bearerAuth: []

# ───────────────────────────────────────────────────────────────────────────
# Paths
# ───────────────────────────────────────────────────────────────────────────

paths:

  /auth/sso/google/callback:
    post:
      tags: [auth]
      summary: Google OAuth 2.0 callback
      description: |
        Handles the redirect back from Google after the user
        authenticates. Verifies `state` against the cookie set
        before redirect, exchanges `code` for an ID token, upserts
        the user row, and issues the session cookie.
      security: []
      operationId: ssoGoogleCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoCallbackRequest'
      responses:
        '200':
          description: Sign-in successful. Body carries user identity; cookie carries the session.
          headers:
            Set-Cookie:
              description: '`ogma_session=<JWT>; HttpOnly; Secure; SameSite=Lax`'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoCallbackResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: |
            State token mismatch (likely CSRF attempt) or the `code`
            was rejected by Google. Returns an ErrorResponse with
            `code: invalid_state` or `code: oauth_exchange_failed`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/sso/microsoft/callback:
    post:
      tags: [auth]
      summary: Microsoft OAuth 2.0 callback
      description: |
        Microsoft Entra (formerly Azure AD) callback. Same flow as
        Google's callback; separate path because the provider's
        token-exchange endpoint and ID-token claim shape differ.
      security: []
      operationId: ssoMicrosoftCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoCallbackRequest'
      responses:
        '200':
          description: Sign-in successful.
          headers:
            Set-Cookie:
              description: '`ogma_session=<JWT>; HttpOnly; Secure; SameSite=Lax`'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoCallbackResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: State mismatch or `code` rejected by Microsoft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/validate-key:
    post:
      tags: [onboarding]
      summary: Validate an Anthropic admin API key
      description: |
        Confirms the supplied key works against Anthropic's Admin API
        by calling `list_workspaces()` (one read-only request — does
        not consume credit). Returns the org name (so the user can
        eyeball that it's the right org) plus a capability matrix
        the UI uses to render the "what we can show you" panel.

        Does NOT seal the key into `encrypted_secrets` yet — that
        happens after region selection so the seal is bound to a
        tenant. Validate-then-bind-then-seal is the sequence.
      operationId: validateAdminKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateKeyRequest'
      responses:
        '200':
          description: Key is valid; returns capabilities + org name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateKeyResponse'
        '400':
          description: |
            Either the request body failed validation (FastAPI's
            standard shape, `code: validation_error`) OR Anthropic
            rejected the supplied key (`code: invalid_admin_key`).
            The UI branches on `code`, not status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/compliance-key:
    post:
      tags: [onboarding]
      summary: Validate + seal a Compliance Access Key (enables content capture)
      description: |
        Collects a tenant's **Compliance Access Key** (`sk-ant-api01-`),
        a separate key type from the Admin API key sealed at first
        onboarding. Validates it against the live Compliance API by
        walking the head of the content-capture enumeration chain —
        `GET /v1/compliance/organizations` then
        `GET /v1/compliance/organizations/{org_uuid}/users` — to confirm
        the key carries BOTH `read:compliance_org_data` and
        `read:compliance_user_data` (content capture spans both scopes).
        On success the key is sealed into `encrypted_secrets` (UPSERT —
        re-submitting rotates it) and `content_capture` flips True in
        `GET /me/capabilities`.

        Admin-gated (`require_admin`). A bad / half-scoped key is
        rejected with a `code`-tagged 400 and nothing is sealed, so
        there is no partial state.

        TM5 T5.1. Built blind against the documented contract; the live
        probe is verified once a sandbox Compliance Access Key lands.
      operationId: submitComplianceKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceKeyRequest'
      responses:
        '200':
          description: Key validated + sealed; content capture enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceKeyResponse'
        '400':
          description: |
            The key is malformed, the wrong key type
            (`code: wrong_key_type` — an Admin key was pasted),
            rejected by Anthropic (`code: invalid_compliance_key`), or
            missing a required compliance scope
            (`code: insufficient_scope`). The UI branches on `code`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          description: |
            `code: admin_required` — the caller is not an admin of their
            tenant. Sealing tenant credentials is an admin action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: |
            `code: anthropic_rate_limited` — Anthropic rate-limited the
            validation probe. Safe to retry after the indicated delay.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/select-region:
    post:
      tags: [onboarding]
      summary: Pick a data-residency region and provision the tenant
      description: |
        Creates the tenant row, provisions the per-tenant DEK (T1.7),
        seals the admin key (previously validated by `validate-key`)
        into `encrypted_secrets`. Once this call returns, the tenant
        is visible to the scheduler in `tenants` and pulls will start
        on the next 15-minute beat fire.

        Region MUST NOT change after this call — every record will be
        anchored to the chosen region's chain.
      operationId: selectRegion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectRegionRequest'
      responses:
        '200':
          description: Tenant created; the JWT will pick up the new tenant_id on next refresh.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '409':
          description: |
            `code: region_already_set` — this user already provisioned
            a tenant. Region is immutable; further `select-region`
            calls for the same user return 409.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/start-backfill:
    post:
      tags: [onboarding]
      summary: Enqueue the 90-day historical backfill
      description: |
        Dispatches the T3.6 `backfill_admin_for_tenant` Celery task
        and returns the task id. The frontend polls
        `/onboarding/backfill-status/{task_id}` until the state
        reaches SUCCESS or FAILURE.

        Idempotent on `tenant_id`: enqueuing a second backfill for the
        same tenant while one is in flight returns the existing task
        id rather than queuing a duplicate.
      operationId: startBackfill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartBackfillRequest'
      responses:
        '200':
          description: Task queued (or already in flight); poll for progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartBackfillResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          description: '`tenant_id` does not belong to the authenticated user.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/backfill-status/{task_id}:
    get:
      tags: [onboarding]
      summary: Poll the backfill task's progress
      description: |
        Reads Celery task state. Safe to call on a 1–2 s polling
        interval — the underlying state lookup is one Redis read.
      operationId: getBackfillStatus
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: The task id returned by `/onboarding/start-backfill`.
      responses:
        '200':
          description: Current task state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackfillStatus'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/mcp-status:
    get:
      tags: [onboarding]
      summary: MCP-connector ingest state for the tenant
      description: |
        Poll-friendly snapshot the onboarding / settings cards use to
        flip the MCP connector to "connected" once the first `mcp`
        telemetry row lands. Capability is driven by USAGE, not
        registration.
      operationId: getMcpStatus
      responses:
        '200':
          description: MCP ingest state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /me:
    get:
      tags: [me]
      summary: Return the signed-in user's profile + tenant binding
      description: |
        The frontend uses this on every route entry to confirm the
        session is still valid and to pick up tenant changes (e.g.,
        after `select-region` updates the JWT's `tenant_id` claim).
      operationId: getMe
      responses:
        '200':
          description: User profile + accessible tenants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /me/capabilities:
    get:
      tags: [me]
      summary: The tenant's current capability snapshot (5 bools)
      description: |
        Drives the onboarding / settings capability cards + empty-state
        copy. Reflects what data the tenant HAS now (telemetry rows per
        source_api in the last 90 days; sealed Compliance Access Key for
        `content_capture`), not what an admin key could probe. Pre-tenant
        users get all-false.
      operationId: getMeCapabilities
      responses:
        '200':
          description: The 5-bool capability snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeCapabilities'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/logout:
    post:
      tags: [auth]
      summary: Clear the session cookie and sign the user out
      description: |
        Clears the `ogma_session` HttpOnly cookie. The response carries
        `Set-Cookie: ogma_session=; Max-Age=0; ...` with the same
        attributes (Path, HttpOnly, Secure, SameSite) that the original
        cookie was set with — browsers only overwrite cookies whose
        attributes match.

        Intentionally NOT gated on a valid session. Calling logout
        when no session exists (expired token, already signed out)
        is a no-op success. The endpoint is idempotent.
      operationId: logout
      responses:
        '204':
          description: |
            Session cleared. Body is empty; the cookie-clearing
            `Set-Cookie` header is the only meaningful response shape.

  /content/chats:
    get:
      tags: [content]
      summary: List captured compliance-content chats for the tenant
      description: |
        Read-only list (TM5 T5.3) of chats captured by the content pull
        (T5.2), aggregated by `chat_id` from the per-message records —
        metadata only, no decryption here. The UI gates this on the
        `content_capture` capability; a tenant with no Compliance Access
        Key simply has an empty list. Newest activity first.
      operationId: listContentChats
      responses:
        '200':
          description: The tenant's captured chats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /content/chats/{chat_id}:
    get:
      tags: [content]
      summary: Get one captured chat with its messages decrypted on read
      description: |
        Returns the chat's messages with text decrypted at request time
        (AES-GCM under the tenant DEK; plaintext is never persisted in
        the clear). RLS-scoped — a cross-tenant `chat_id` guess 404s. A
        message whose blob can't be decrypted has `content: null` and
        still renders (the request doesn't fail).
      operationId: getContentChatDetail
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: The chat + its decrypted messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: |
            `code: chat_not_found` — no captured chat with that id for
            your tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [content]
      summary: Delete one captured chat's content (admin)
      description: |
        TM6 T6.1 — admin only. Deletes the chat's message blobs and
        appends one `content_deletion` chain event per message. The chain
        records themselves are never mutated or removed (the hash chain
        stays verifiable); only the content is gone. Idempotent —
        re-deleting reports `already_deleted`.
      operationId: deleteContentChat
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeletionRequest'
      responses:
        '200':
          description: Deletion result (counts).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /content/users/{subject_user_id}:
    delete:
      tags: [content]
      summary: Delete all of one user's captured content — DSR (admin)
      description: |
        TM6 T6.1 — admin only. Right-to-be-forgotten for one data
        subject: deletes every content blob of theirs across all chats +
        appends a `content_deletion` event per message. Chain-safe +
        idempotent (same posture as the per-chat delete).
      operationId: deleteUserContent
      parameters:
        - name: subject_user_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeletionRequest'
      responses:
        '200':
          description: Deletion result (counts).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /content/tenant/shred:
    post:
      tags: [content]
      summary: Crypto-shred ALL tenant content — terminal offboarding (admin)
      description: |
        TM6 T6.1 — admin only, TERMINAL + irreversible. Destroys the
        tenant DEK: every content blob AND sealed secret becomes
        permanently undecryptable at once. Appends one tenant-scoped
        `content_deletion` event. `confirm_tenant_id` must equal the
        caller's own tenant_id (typed confirmation) or the call 400s.
      operationId: cryptoShredTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantShredRequest'
      responses:
        '200':
          description: Shred result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantShredResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /content/chats/{chat_id}/reveal:
    post:
      tags: [content]
      summary: Reveal one chat's content with PII unmasked (admin, audit-logged)
      description: |
        TM6 T6.3 — admin only. Returns the chat with PII UNMASKED and
        appends a tamper-evident content_reveal chain event (who revealed
        it + when). Builds first, so an unknown / cross-tenant chat 404s
        before anything is logged or exposed.
      operationId: revealContentChat
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: "The chat with messages unmasked (revealed=true)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: "`code: chat_not_found` — no such chat for your tenant."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /content/export:
    get:
      tags: [content]
      summary: Export captured content — JSON bundle, PDF, or both (admin)
      description: |
        TM6 T6.2 — admin only. Returns a downloadable ZIP bundle:
        `manifest.json` (metadata + chain-verification summary),
        `chats.json` (the captured chats with decrypted message text),
        `chain_proof.json` (per-record hash-chain proof — chain_seq /
        self_hash / prev_hash / content_hash + the GENESIS-to-tip
        verify result), and a `README.txt` explaining how an auditor can
        independently confirm the export wasn't altered. Scoped by tenant
        (always) and optionally by data subject + date range. Purged
        messages appear in the proof but without content.
      operationId: exportContent
      parameters:
        - name: format
          in: query
          required: false
          description: |
            `zip` (JSON bundle — manifest + chats + chain_proof + README;
            default), `pdf` (legal production — Bates-numbered transcript +
            proof appendix), or `both` (one zip with the JSON bundle + the
            PDF). zip / both → application/zip; pdf → application/pdf.
          schema:
            type: string
            enum: [zip, pdf, both]
            default: zip
        - name: subject_user_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: reveal
          in: query
          required: false
          description: |
            TM6 T6.3 — include full (unredacted) PII content. Default
            false (PII masked). A true value appends an audit-logged
            content_reveal event.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: |
            The export. application/zip for `zip` (JSON bundle) and `both`
            (zip with JSON bundle + export.pdf); application/pdf for `pdf`.
          content:
            application/zip:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions:
    get:
      tags: [sessions]
      summary: List Sessions for the authenticated tenant
      description: |
        Each Session is one (date, actor) tuple aggregated from the
        `code_analytics` + `compliance_activities` streams. Sorted
        newest-first (by `last_seen`); cursor-paginated.

        T5.5 invariant: only `code_analytics` and
        `compliance_activities` records contribute to Sessions. Admin
        API usage records are bucket-grain and excluded. Tenants
        without Code Analytics activity (e.g., Personal-plan orgs
        that don't use Claude Code) see an empty list and the
        dashboard renders the "no sessions yet" empty state.
      operationId: listSessions
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: Opaque cursor from a prior response's `next_cursor`.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
        - in: query
          name: source_api
          schema:
            type: string
            enum: [code_analytics, compliance_activities]
          description: |
            Filter to one ingest stream. Omit to include both.
        - in: query
          name: actor_key
          schema:
            type: string
          description: Filter by the actor's natural identifier (email or api_key_name).
        - in: query
          name: since
          schema:
            type: string
            format: date
          description: Inclusive lower bound on session date (UTC).
        - in: query
          name: until
          schema:
            type: string
            format: date
          description: Inclusive upper bound on session date (UTC).
      responses:
        '200':
          description: Sessions list page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{session_id}:
    get:
      tags: [sessions]
      summary: Get one Session's full record list
      description: |
        Returns every audit-chain record folded into this Session, in
        chain order. Records carrying a MinIO content blob (T5.1+
        feature; T5.6 first wires content ingest) have their plaintext
        decrypted server-side via the tenant DEK and surfaced in the
        `content` field; records without a blob have `content: null`.

        `session_id` is the opaque identifier from the list response —
        base64url of `{date}|{actor_type}|{actor_key}`. Malformed
        session ids return 400; sessions that don't exist for the
        authenticated tenant return 404 (RLS keeps cross-tenant lookups
        impossible regardless).
      operationId: getSessionDetail
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session detail with all underlying records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /usage:
    get:
      tags: [usage]
      summary: List Admin API token-usage rows for the authenticated tenant
      description: |
        Returns one row per (date, workspace_id, model) breakdown from
        the Anthropic Admin API usage endpoint. The connector pulls
        once per day per tenant; each row in the response is one
        result-group inside one daily bucket (`metadata.results[idx]`
        on a `record_type='usage'`, `source_api='admin'` record).

        T5.5.5 invariant: only Admin API usage records contribute
        here. Per-actor (developer-session) data lives in `/sessions`.

        ## Totals
        The `totals` object aggregates across the **entire filtered
        set**, not just the current page — computing it client-side
        from page rows would undercount on multi-page results.

        ## Defaults
        `since` defaults to 30 days before `until` so customers see
        roughly "the last month" without thinking about it. `until`
        defaults to today (UTC).

        ## Pagination
        Cursor-paginated, newest-first by `occurred_at` then by
        record id then by result-group ordinality. Pass the
        `next_cursor` from one response back as the `cursor` query
        param on the next.

        ## Not in T5.5.5
        - `estimated_cost_usd`: today's connector calls the usage
          endpoint without `group_by=model`, so model is null and
          per-model pricing isn't computable. Tracked as a follow-up.
        - Human-friendly workspace names: workspace_id is the vendor
          opaque id; a Workspaces side table is owed.
        - CSV export.
      operationId: listUsage
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: Opaque cursor from a prior response's `next_cursor`.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
        - in: query
          name: since
          schema:
            type: string
            format: date
          description: Inclusive lower bound on bucket date (UTC). Defaults to 30 days before `until`.
        - in: query
          name: until
          schema:
            type: string
            format: date
          description: Inclusive upper bound on bucket date (UTC). Defaults to today.
        - in: query
          name: workspace_id
          schema:
            type: string
          description: |
            Filter to one workspace. When the connector did not
            request a workspace breakdown, the only matching rows
            are those with `workspace_id` literally equal to this
            value (which is typically not what callers want).
        - in: query
          name: model
          schema:
            type: string
          description: |
            Filter to one model name (`claude-sonnet-4-5`,
            `claude-opus-4-7`, etc.). Same caveat as `workspace_id`
            when the connector did not request a model breakdown.
      responses:
        '200':
          description: Usage rows page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /usage/cache-recommendations:
    get:
      tags: [usage]
      summary: Per-model cache hit-rate + prompt-caching recommendations
      description: |
        Pure analysis (TM5 T5.5) over the captured Admin-API usage
        records — no new ingest. Per model over the window: cache
        hit-rate (`cache_read / (cache_read + cache_creation)`) + a
        severity-tagged recommendation (low reuse → stabilize the cached
        prefix / raise TTL; no caching on high input → enable prompt
        caching). Sorted most-actionable first.
      operationId: getCacheRecommendations
      parameters:
        - in: query
          name: since
          schema:
            type: string
            format: date
          description: Inclusive start date (UTC). Defaults to 30 days before `until`.
        - in: query
          name: until
          schema:
            type: string
            format: date
          description: Inclusive end date (UTC). Defaults to today.
      responses:
        '200':
          description: Per-model cache stats + recommendations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheRecommendationsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────────────────────────────────────────────────────
  # Budgets (TM3 Phase B)
  # ─────────────────────────────────────────────────────────────────────────

  /budgets:
    get:
      tags: [budgets]
      summary: List the authenticated tenant's live (non-deleted) budgets
      operationId: listBudgets
      responses:
        '200':
          description: Budget rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
