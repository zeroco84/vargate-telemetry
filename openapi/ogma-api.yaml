          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'

  /budgets/{budget_id}:
    parameters:
      - in: path
        name: budget_id
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [budgets]
      summary: Budget detail with current-period spend + ratio
      operationId: getBudgetDetail
      responses:
        '200':
          description: Budget detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    patch:
      tags: [budgets]
      summary: Update mutable fields on a budget
      operationId: updateBudget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetUpdate'
      responses:
        '200':
          description: The updated budget.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [budgets]
      summary: Soft-delete a budget (sets deleted_at; row stays in the table)
      operationId: deleteBudget
      responses:
        '204':
          description: Budget soft-deleted; no body.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'

  /budget-alerts:
    get:
      tags: [budgets]
      summary: List alert events fired against this tenant's budgets
      operationId: listBudgetAlerts
      parameters:
        - in: query
          name: unack
          schema:
            type: boolean
            default: false
          description: |
            When true, exclude already-acknowledged alerts (active-
            alerts view). When false / omitted, the full alert
            history is returned (paged by fired_at DESC, capped at
            200 most-recent).
      responses:
        '200':
          description: Alert rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetAlertListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /budget-alerts/{alert_id}/acknowledge:
    parameters:
      - in: path
        name: alert_id
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [budgets]
      summary: Mark a fired alert as acknowledged by the current user
      operationId: acknowledgeBudgetAlert
      responses:
        '200':
          description: Acknowledged alert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetAlertEvent'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  # ─────────────────────────────────────────────────────────────────────────
  # Cross-surface users (TM3 Phase C)
  # ─────────────────────────────────────────────────────────────────────────

  /users:
    get:
      tags: [users]
      summary: Cross-surface user roster + per-user rollup + unmapped activity
      operationId: listUsers
      responses:
        '200':
          description: User roster + unmapped aliases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /users/{user_id}:
    parameters:
      - in: path
        name: user_id
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [users]
      summary: One user's activity stitched across every surface
      operationId: getUserDetail
      responses:
        '200':
          description: User detail with heatmap, spend trend, recent activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /users/{user_id}/aliases:
    parameters:
      - in: path
        name: user_id
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [users]
      summary: Manually map an (source_api, identifier) alias to this user
      operationId: mapUserAlias
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AliasMapRequest'
      responses:
        '201':
          description: The mapped alias (auto_matched=false).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAlias'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /users/{user_id}/role:
    parameters:
      - in: path
        name: user_id
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [users]
      summary: Set a tenant member's role ('admin' | 'member') — admin only
      operationId: setUserRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdateRequest'
      responses:
        '200':
          description: The target user's new role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleUpdateResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Refused — would remove the tenant's only admin (code
            `last_admin`). Promote another user to admin first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid role value (code `invalid_role`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
