openapi: 3.1.0

info:
  title: Vargate Ogma API
  version: "0.1.0"
  description: |
    Public HTTP contract for Ogma (the Vargate Telemetry product).

    This file is the contract source of truth — the backend implements
    against it, the frontend generates TypeScript types from it. See
    `openapi/README.md` for the contract-first change order.

    The shape covers the T4 onboarding flow:
      1. SSO sign-in (Google / Microsoft callback)
      2. Validate the supplied Anthropic admin key
      3. Pick a region
      4. Start the 90-day backfill
      5. Poll backfill status until done

    Plus `/me` for "who am I currently signed in as."

    Subsequent sprints (T5+) extend this file additively — adding new
    paths, new schemas, new tags. Breaking changes (renames, removed
    fields) require a major version bump and a deprecation window.
  contact:
    name: Vargate engineering
    email: engineering@vargate.ai
  license:
    name: Business Source License 1.1
    url: https://github.com/zeroco84/vargate-telemetry/blob/main/LICENSE

servers:
  - url: /api
    description: Same-origin (nginx routes /api/ to the FastAPI gateway).

tags:
  - name: auth
    description: SSO sign-in flows.
  - name: onboarding
    description: First-run flow that gets a paying customer to "data flowing" in <60 s.
  - name: me
    description: The authenticated caller's identity.

# ───────────────────────────────────────────────────────────────────────────
# Security schemes
# ───────────────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ogma_session
      description: |
        HttpOnly Secure cookie set by `/api/auth/sso/*/callback` on
        successful sign-in. Carries the short-lived JWT. Default
        auth scheme for browser callers.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        `Authorization: Bearer <JWT>`. Programmatic callers (CI
        scripts, integration tests) that can't use cookies. The JWT
        format is identical to the cookie payload.

  # ─────────────────────────────────────────────────────────────────────────
  # Reusable schemas
  # ─────────────────────────────────────────────────────────────────────────

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable code (snake_case). Clients branch on this, not on `message`.
          examples: ["validation_error", "invalid_admin_key", "tenant_not_found", "unauthenticated"]
        message:
          type: string
          description: Human-readable, English. Display verbatim or use for diagnostics.
          examples: ["Anthropic rejected the supplied admin key as invalid."]
        details:
          type: array
          description: Per-field validation breakdown when applicable. Empty / omitted for non-validation errors.
          items:
            type: object
            required: [field, issue]
            properties:
              field:
                type: string
                examples: ["admin_key"]
              issue:
                type: string
                examples: ["must start with 'sk-ant-admin01-'"]
      examples:
        - code: validation_error
          message: One or more fields failed validation.
          details:
            - field: admin_key
              issue: "must start with 'sk-ant-admin01-'"

    SsoCallbackRequest:
      type: object
      required: [code, state]
      description: OAuth 2.0 authorization-code callback parameters.
      properties:
        code:
          type: string
          description: The authorization code issued by the provider.
        state:
          type: string
          description: |
            The CSRF token the frontend set before redirecting to the provider.
            Backend verifies it matches the value stored in the short-lived
            state cookie.

    SsoCallbackResponse:
      type: object
      required: [user_id, email]
      description: |
        Returned alongside the `Set-Cookie: ogma_session=...` response
        header. The session cookie is the durable artifact; this body
        is for clients that want to render "signed in as ..." without
        a follow-up `/me` round-trip.
      properties:
        user_id:
          type: string
          description: Stable internal id, NOT the SSO provider's `sub`.
          examples: ["usr_01HXYZ..."]
        email:
          type: string
          format: email
          examples: ["alice@example.com"]
        name:
          type: string
          description: Provider-supplied display name. May be absent.

    ValidateKeyRequest:
      type: object
      required: [admin_key]
      properties:
        admin_key:
          type: string
          description: Anthropic admin API key (begins `sk-ant-admin01-`).
          minLength: 30
          examples: ["sk-ant-admin01-abc123..."]

    KeyCapabilities:
      type: object
      required: [admin_api, activity_feed, content_capture, code_analytics]
      description: |
        Which Anthropic capabilities the supplied admin key actually
        unlocks. Each bool is determined by a read-only probe against
        the corresponding endpoint family. The UI renders this as a
        per-capability matrix so the user knows up-front what kind of
        data the dashboard will surface.

        T5.3 replaced the earlier `compliance_api` single-bool with
        two distinct booleans: `activity_feed` (reachable by Admin
        API keys with `read:compliance_activities` scope) and
        `content_capture` (requires a separate Compliance Access Key
        created in claude.ai by an Enterprise Primary Owner). The
        previous single-bool was misleading — it returned True on
        every Admin key with admin scope, but actual content capture
        is gated behind plan tier + a second key type.
      properties:
        admin_api:
          type: boolean
          description: |
            Can call `/v1/organizations/usage_report/messages`. The
            Admin API surface used by T3+ for usage metering, member
            enumeration, and workspace listing.
        activity_feed:
          type: boolean
          description: |
            Can call `/v1/compliance/activities`. T5.3 ingests
            authentication / chat-created / file-uploaded / admin /
            platform event metadata into `telemetry_records` every 15
            minutes. Reachable by Admin API keys carrying the
            `read:compliance_activities` scope. False if the key (or
            the org's plan) doesn't include Activity Feed access.
        content_capture:
          type: boolean
          description: |
            Can pull underlying chat messages, files, and project
            content (`/v1/compliance/apps/chats/*`). Requires a
            **Compliance Access Key** (`sk-ant-api01-...`) created in
            claude.ai by an Enterprise Primary Owner — NOT the same
            as the Admin API key (`sk-ant-admin01-...`) that today's
            onboarding collects. T5.3 always returns `false` here;
            a future sprint adds the Compliance Access Key onboarding
            step. The UI renders this row as
            "Enable later — requires Compliance Access Key".
        code_analytics:
          type: boolean
          description: |
            Has Claude Code Analytics access. T5.4 will land the real
            probe; today this is always `false`.

    ValidateKeyResponse:
      type: object
      required: [org_name, capabilities]
      properties:
        org_name:
          type: string
          description: |
            The Anthropic org name the key belongs to, as returned by
            `list_workspaces()`. Displayed in the UI so the user can
            confirm they pasted the right key.
          examples: ["Acme Corp"]
        capabilities:
          $ref: '#/components/schemas/KeyCapabilities'

    Region:
      type: string
      enum: [us, eu]
      description: |
        Data-residency region. Once set on a tenant it MUST NOT change —
        the first anchor is region-bound. Future regions (apac, etc.)
        will be added here.

    SelectRegionRequest:
      type: object
      required: [region, admin_key]
      properties:
        region:
          $ref: '#/components/schemas/Region'
        admin_key:
          type: string
          description: |
            The Anthropic admin key, previously validated by
            `/onboarding/validate-key`. Sealed into
            `encrypted_secrets` inside the same transaction that
            creates the tenant row, so a mid-flow failure never
            leaves a sealed key without a tenant or vice versa.
          minLength: 30

    Tenant:
      type: object
      required: [tenant_id, region]
      properties:
        tenant_id:
          type: string
          description: Stable per-tenant identifier (matches `tenants.tenant_id`).
          examples: ["tnt_01HXYZ..."]
        region:
          $ref: '#/components/schemas/Region'

    StartBackfillRequest:
      type: object
      required: [tenant_id]
      properties:
        tenant_id:
          type: string
        days:
          type: integer
          description: |
            How many days of history to pull. Defaults to 90 (the
            T3.6 backfill default). Bounded to avoid runaway pulls.
          minimum: 1
          maximum: 365
          default: 90

    StartBackfillResponse:
      type: object
      required: [task_id]
      properties:
        task_id:
          type: string
          description: |
            Celery task id. Pass to `GET /onboarding/backfill-status/{task_id}`
            to poll progress.
          examples: ["6f8b9c..."]

    BackfillState:
      type: string
      enum: [PENDING, STARTED, PROGRESS, SUCCESS, FAILURE]
      description: |
        Celery task state.

          - PENDING  — queued, worker has not picked it up yet.
          - STARTED  — worker accepted the task but has not yet
            crossed the first chunk boundary.
          - PROGRESS — at least one 7-day chunk has completed; the
            `meta` carries chunks_processed / inserted / deduped.
            The frontend polls and re-renders the progress bar on
            every PROGRESS tick.
          - SUCCESS  — done. The task return value carries the final
            totals; the response surfaces them via the same fields.
          - FAILURE  — exhausted retries. `error` carries a short
            human-readable summary (class name + message).

    BackfillStatus:
      type: object
      required: [state]
      properties:
        state:
          $ref: '#/components/schemas/BackfillState'
        chunks_processed:
          type: integer
          minimum: 0
          description: |
            Number of 7-day chunks the backfill has completed. Set
            on PROGRESS / SUCCESS; absent or 0 in PENDING / STARTED.
        inserted:
          type: integer
          minimum: 0
          description: Total telemetry_records rows inserted so far.
        deduped:
          type: integer
          minimum: 0
          description: |
            Buckets that hit the (tenant_id, source_api, external_id)
            UNIQUE constraint — expected when the backfill resumes
            after a partial run.
        error:
          type: string
          description: |
            Present only on FAILURE. Truncated to 1000 chars for
            display safety. Format: `<ExceptionClass>: <message>`.

    Me:
      type: object
      required: [user_id, email, tenants]
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        sso_provider:
          type: string
          enum: [google, microsoft]
        tenants:
          type: array
          description: |
            All tenants this user has access to. Empty array means the
            user is signed in but hasn't completed onboarding yet
            (between SSO callback and `/onboarding/select-region`).
          items:
            $ref: '#/components/schemas/Tenant'

    # ─────────────────────────────────────────────────────────────────────
    # Sessions (T5.5) — first dashboard view of ingested content.
    # A Session is one (date, actor) tuple aggregated across the
    # `code_analytics` and `compliance_activities` streams. Admin API
    # usage records are bucket-grain, not actor-grain, so they don't
    # roll up into Sessions.
    # ─────────────────────────────────────────────────────────────────────

    SessionActor:
      type: object
      required: [type, key]
      description: |
        The principal behind a Session. `type` is the vendor's actor
        discriminator (`user_actor` / `api_actor` / etc.); `key` is the
        natural identifier — email for users, api_key_name (or
        api_key_id) for keys. Forward-compatible with novel actor
        types via `extra="allow"` semantics on the underlying records.
      properties:
        type:
          type: string
          examples: ["user_actor", "api_actor"]
        key:
          type: string
          examples: ["dev@example.com", "ci-deploy-key"]

    SessionSummary:
      type: object
      required: [session_id, date, actor, source_apis, event_count, first_seen, last_seen]
      description: |
        One row in the Sessions list. `session_id` is opaque (base64url
        of `{date}|{actor_type}|{actor_key}`); pass it back to
        `/sessions/{session_id}` for the detail view.
      properties:
        session_id:
          type: string
          description: Opaque, URL-safe identifier. Stable per (date, actor).
        date:
          type: string
          format: date
          description: UTC date of the session.
        actor:
          $ref: '#/components/schemas/SessionActor'
        source_apis:
          type: array
          description: |
            Which ingest streams contributed records to this session
            (`code_analytics`, `compliance_activities`). T5.5 primarily
            surfaces Code Analytics; Activity Feed feeds in for tenants
            with `activity_feed: true`.
          items:
            type: string
        event_count:
          type: integer
          description: Total underlying records folded into this session.
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time

    SessionListResponse:
      type: object
      required: [sessions, next_cursor]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor for the next page. `null` when no more.
            Pass back as the `cursor` query param.

    SessionRecord:
      type: object
      required: [record_id, source_api, occurred_at, external_id, metadata]
      description: |
        One underlying audit-chain record inside a Session. T5.5 returns
        all records folded into the session in chain order. The
        `content` field is populated when the record carries a MinIO
        content blob (T5.1+); T5.6's Compliance Content path is the
        first ingest that will surface non-null content here.
      properties:
        record_id:
          type: string
          format: uuid
        source_api:
          type: string
        record_type:
          type: string
        occurred_at:
          type: string
          format: date-time
        external_id:
          type: string
          description: Vendor-side stable id (or synthesized natural key).
        metadata:
          type: object
          description: |
            The full vendor record JSON, including type-specific extra
            fields. T5.4's flat-model-with-extra-allow ingest pattern
            means future fields land here without an API change.
          additionalProperties: true
        content_size_bytes:
          type: integer
          nullable: true
          description: Plaintext size of the content blob, if any.
        content:
          type: string
          nullable: true
          description: |
            Plaintext content blob (T5.6+). Decrypted server-side from
            MinIO using the tenant DEK if `content_ref` is non-null
            on the underlying record. `null` for records without an
            attached blob (the common case in T5.5).

    SessionDetailResponse:
      type: object
      required: [session_id, date, actor, records]
      properties:
        session_id:
          type: string
        date:
          type: string
          format: date
        actor:
          $ref: '#/components/schemas/SessionActor'
        records:
          type: array
          items:
            $ref: '#/components/schemas/SessionRecord'

  # ─────────────────────────────────────────────────────────────────────────
  # Reusable response bodies — every 4xx / 5xx is an ErrorResponse.
  # ─────────────────────────────────────────────────────────────────────────

  responses:
    BadRequest:
      description: Validation failure or malformed input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthenticated:
      description: Missing or invalid session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but lacks permission for this tenant or resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The named resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unhandled server error. Body is safe-to-display; details land in server logs.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# ───────────────────────────────────────────────────────────────────────────
# Default security: every endpoint requires either the cookie or a Bearer
# token. Endpoints that don't (the SSO callbacks) override with `security: []`.
# ───────────────────────────────────────────────────────────────────────────

security:
  - cookieAuth: []
  - bearerAuth: []

# ───────────────────────────────────────────────────────────────────────────
# Paths
# ───────────────────────────────────────────────────────────────────────────

paths:

  /auth/sso/google/callback:
    post:
      tags: [auth]
      summary: Google OAuth 2.0 callback
      description: |
        Handles the redirect back from Google after the user
        authenticates. Verifies `state` against the cookie set
        before redirect, exchanges `code` for an ID token, upserts
        the user row, and issues the session cookie.
      security: []
      operationId: ssoGoogleCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoCallbackRequest'
      responses:
        '200':
          description: Sign-in successful. Body carries user identity; cookie carries the session.
          headers:
            Set-Cookie:
              description: '`ogma_session=<JWT>; HttpOnly; Secure; SameSite=Lax`'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoCallbackResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: |
            State token mismatch (likely CSRF attempt) or the `code`
            was rejected by Google. Returns an ErrorResponse with
            `code: invalid_state` or `code: oauth_exchange_failed`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/sso/microsoft/callback:
    post:
      tags: [auth]
      summary: Microsoft OAuth 2.0 callback
      description: |
        Microsoft Entra (formerly Azure AD) callback. Same flow as
        Google's callback; separate path because the provider's
        token-exchange endpoint and ID-token claim shape differ.
      security: []
      operationId: ssoMicrosoftCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoCallbackRequest'
      responses:
        '200':
          description: Sign-in successful.
          headers:
            Set-Cookie:
              description: '`ogma_session=<JWT>; HttpOnly; Secure; SameSite=Lax`'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoCallbackResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: State mismatch or `code` rejected by Microsoft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/validate-key:
    post:
      tags: [onboarding]
      summary: Validate an Anthropic admin API key
      description: |
        Confirms the supplied key works against Anthropic's Admin API
        by calling `list_workspaces()` (one read-only request — does
        not consume credit). Returns the org name (so the user can
        eyeball that it's the right org) plus a capability matrix
        the UI uses to render the "what we can show you" panel.

        Does NOT seal the key into `encrypted_secrets` yet — that
        happens after region selection so the seal is bound to a
        tenant. Validate-then-bind-then-seal is the sequence.
      operationId: validateAdminKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateKeyRequest'
      responses:
        '200':
          description: Key is valid; returns capabilities + org name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateKeyResponse'
        '400':
          description: |
            Either the request body failed validation (FastAPI's
            standard shape, `code: validation_error`) OR Anthropic
            rejected the supplied key (`code: invalid_admin_key`).
            The UI branches on `code`, not status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/select-region:
    post:
      tags: [onboarding]
      summary: Pick a data-residency region and provision the tenant
      description: |
        Creates the tenant row, provisions the per-tenant DEK (T1.7),
        seals the admin key (previously validated by `validate-key`)
        into `encrypted_secrets`. Once this call returns, the tenant
        is visible to the scheduler in `tenants` and pulls will start
        on the next 15-minute beat fire.

        Region MUST NOT change after this call — every record will be
        anchored to the chosen region's chain.
      operationId: selectRegion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectRegionRequest'
      responses:
        '200':
          description: Tenant created; the JWT will pick up the new tenant_id on next refresh.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '409':
          description: |
            `code: region_already_set` — this user already provisioned
            a tenant. Region is immutable; further `select-region`
            calls for the same user return 409.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/start-backfill:
    post:
      tags: [onboarding]
      summary: Enqueue the 90-day historical backfill
      description: |
        Dispatches the T3.6 `backfill_admin_for_tenant` Celery task
        and returns the task id. The frontend polls
        `/onboarding/backfill-status/{task_id}` until the state
        reaches SUCCESS or FAILURE.

        Idempotent on `tenant_id`: enqueuing a second backfill for the
        same tenant while one is in flight returns the existing task
        id rather than queuing a duplicate.
      operationId: startBackfill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartBackfillRequest'
      responses:
        '200':
          description: Task queued (or already in flight); poll for progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartBackfillResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          description: '`tenant_id` does not belong to the authenticated user.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /onboarding/backfill-status/{task_id}:
    get:
      tags: [onboarding]
      summary: Poll the backfill task's progress
      description: |
        Reads Celery task state. Safe to call on a 1–2 s polling
        interval — the underlying state lookup is one Redis read.
      operationId: getBackfillStatus
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: The task id returned by `/onboarding/start-backfill`.
      responses:
        '200':
          description: Current task state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackfillStatus'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /me:
    get:
      tags: [me]
      summary: Return the signed-in user's profile + tenant binding
      description: |
        The frontend uses this on every route entry to confirm the
        session is still valid and to pick up tenant changes (e.g.,
        after `select-region` updates the JWT's `tenant_id` claim).
      operationId: getMe
      responses:
        '200':
          description: User profile + accessible tenants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions:
    get:
      tags: [sessions]
      summary: List Sessions for the authenticated tenant
      description: |
        Each Session is one (date, actor) tuple aggregated from the
        `code_analytics` + `compliance_activities` streams. Sorted
        newest-first (by `last_seen`); cursor-paginated.

        T5.5 invariant: only `code_analytics` and
        `compliance_activities` records contribute to Sessions. Admin
        API usage records are bucket-grain and excluded. Tenants
        without Code Analytics activity (e.g., Personal-plan orgs
        that don't use Claude Code) see an empty list and the
        dashboard renders the "no sessions yet" empty state.
      operationId: listSessions
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: Opaque cursor from a prior response's `next_cursor`.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: source_api
          schema:
            type: string
            enum: [code_analytics, compliance_activities]
          description: |
            Filter to one ingest stream. Omit to include both.
        - in: query
          name: actor_key
          schema:
            type: string
          description: Filter by the actor's natural identifier (email or api_key_name).
        - in: query
          name: since
          schema:
            type: string
            format: date
          description: Inclusive lower bound on session date (UTC).
        - in: query
          name: until
          schema:
            type: string
            format: date
          description: Inclusive upper bound on session date (UTC).
      responses:
        '200':
          description: Sessions list page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{session_id}:
    get:
      tags: [sessions]
      summary: Get one Session's full record list
      description: |
        Returns every audit-chain record folded into this Session, in
        chain order. Records carrying a MinIO content blob (T5.1+
        feature; T5.6 first wires content ingest) have their plaintext
        decrypted server-side via the tenant DEK and surfaced in the
        `content` field; records without a blob have `content: null`.

        `session_id` is the opaque identifier from the list response —
        base64url of `{date}|{actor_type}|{actor_key}`. Malformed
        session ids return 400; sessions that don't exist for the
        authenticated tenant return 404 (RLS keeps cross-tenant lookups
        impossible regardless).
      operationId: getSessionDetail
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session detail with all underlying records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
