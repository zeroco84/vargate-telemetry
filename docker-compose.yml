# Vargate Telemetry — dev compose stack.
#
# This is the dev-only stack used while iterating locally. The production
# overlay (`docker-compose.prod.yml`, internal-only networking, restart
# policies, resource limits) lands in T1.9.
#
# Subsequent T1.x sprints append their services to this file:
#   - T1.2 adds MinIO
#   - T1.3 adds celery-worker + celery-beat
#   - T1.4+ adds the Telemetry FastAPI gateway
#   - T4.7.1 bridges the gateway to Tyr's network so Tyr's Prometheus
#     can scrape Ogma's /metrics endpoint without exposing the rest
#     of the Telemetry stack (Postgres, Redis, MinIO, Celery workers).
#
# Networks (T4.7.1):
#   - `telemetry_internal` — bridge, used by every Telemetry service for
#     in-stack DNS (postgres/redis/minio/etc). Replaces the previous
#     implicit `vargate-telemetry_default` network so the explicit
#     model below works.
#   - `tyr_observability` — external; the gateway joins this so Tyr's
#     Prometheus (running in a different compose project) can resolve
#     `vargate-telemetry-gateway-1` over Docker DNS.
#
# Pick the right `tyr_observability` name for the environment:
#   - dev (this box, plain `docker compose up`): `vargate_default` (the
#     auto-created network from the Tyr project running plain
#     docker-compose.yml). This is the default.
#   - prod (Tyr running with docker-compose.prod.yml overlay):
#     `vargate_vargate-internal` (the project-prefixed name of the
#     explicit `vargate-internal` bridge in the prod overlay). Set
#     `TYR_OBSERVABILITY_NETWORK=vargate_vargate-internal` in the .env.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - vargate-postgres-data:/var/lib/postgresql/data
    networks:
      - telemetry_internal
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    volumes:
      - vargate-minio-data:/data
    networks:
      - telemetry_internal
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      interval: 10s
      retries: 5

  # T5.0: One-shot bootstrap that creates the tenant-content bucket if it
  # doesn't exist. Uses MinIO's `mc` CLI (same upstream maintainer as the
  # server, pinned to a release tag aligned with the server's). Runs to
  # completion and exits — `restart: "no"` keeps it from looping forever
  # in `docker compose up` after the bucket is created.
  #
  # Idempotent: `mc mb --ignore-existing` is a no-op if the bucket is
  # already there, so this can run on every `up` without producing
  # spurious errors. Compose's `service_completed_successfully` is the
  # right depends_on condition for downstream services that need the
  # bucket to exist (we'll wire that in T5.1 once an ingest task actually
  # writes content).
  minio-bootstrap:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_TENANT_CONTENT_BUCKET: ${MINIO_TENANT_CONTENT_BUCKET:-tenant-content}
    networks:
      - telemetry_internal
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "▶ aliasing local MinIO as 'ogma'"
        mc alias set ogma http://minio:9000 \
          "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        echo "▶ ensuring bucket: $${MINIO_TENANT_CONTENT_BUCKET}"
        mc mb --ignore-existing "ogma/$${MINIO_TENANT_CONTENT_BUCKET}"
        # No lifecycle policy: tenant content retention is governed by
        # explicit code paths (T5+ delete on `account_deleted`), not by
        # MinIO auto-expiry. A future crypto-shred PRD lands here.
        echo "▶ bucket inventory:"
        mc ls "ogma/$${MINIO_TENANT_CONTENT_BUCKET}" || true
        echo "✓ minio-bootstrap done"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - vargate-redis-data:/data
    networks:
      - telemetry_internal
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      retries: 5

  celery-worker:
    build:
      context: .
      # T2.2: forward the host's SSH agent into the build so pip can
      # clone vargate-proxy (private) for the vargate-audit-chain dep.
      # Build with: `docker compose build --ssh default celery-worker`.
      ssh:
        - default
    image: vargate-telemetry:dev
    restart: unless-stopped
    command:
      - celery
      - -A
      - vargate_telemetry.celery_app
      - worker
      - --loglevel=info
      - -Q
      - telemetry,default
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL}
      PKCS11_MODULE: ${PKCS11_MODULE}
      HSM_TOKEN_LABEL: ${HSM_TOKEN_LABEL}
      HSM_KEK_LABEL: ${HSM_KEK_LABEL}
      HSM_PIN: ${HSM_PIN}
      HSM_SO_PIN: ${HSM_SO_PIN}
      STRIPE_API_KEY_TEST: ${STRIPE_API_KEY_TEST:-}
      VARGATE_REGION: ${VARGATE_REGION:-us}
      ANTHROPIC_ADMIN_KEY_TEST: ${ANTHROPIC_ADMIN_KEY_TEST:-}
      # TM4 Track D: Messages-API key for the Haiku topic classifier
      # (anthropic SDK). Distinct from ANTHROPIC_ADMIN_KEY_TEST above,
      # which is the custom httpx Admin-API client. Worker-only — the
      # classifier task runs here; beat just .delay()s, gateway only reads.
      # Sourced from OGMA_ANTHROPIC_API_KEY (namespaced) rather than the bare
      # ANTHROPIC_API_KEY: an ambient ANTHROPIC_API_KEY in the deploy shell
      # always wins compose interpolation and would shadow the .env value
      # (it silently deployed empty once). The container still gets the
      # SDK-standard ANTHROPIC_API_KEY name that anthropic reads by default.
      ANTHROPIC_API_KEY: ${OGMA_ANTHROPIC_API_KEY:-}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:-}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:-}
      OGMA_OAUTH_REDIRECT_BASE: ${OGMA_OAUTH_REDIRECT_BASE:-https://vargate.ai}
      OGMA_CORS_ORIGINS: ${OGMA_CORS_ORIGINS:-http://localhost:5173}
      # T4.8.1: shared multiproc dir for prometheus_client. The Counter
      # and Histogram observations this worker emits land as files in
      # this dir; the gateway's /metrics endpoint reads from the same
      # dir to aggregate. See `vargate-prom-multiproc` volume below.
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      # T5.0: object-store wrapper config. The worker reads/writes
      # tenant content blobs (T5.1 onward) via boto3 against the
      # in-stack MinIO. ENDPOINT + bucket name are env-driven so a
      # future migration to a different MinIO cluster or AWS S3 is a
      # config-only change. ROOT credentials are reused here for the
      # half-day T5.0 scope; T5.x should mint a scoped MinIO service
      # account with PutObject/GetObject on `tenant-content/*` only.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_TENANT_CONTENT_BUCKET: ${MINIO_TENANT_CONTENT_BUCKET:-tenant-content}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # TM3 Phase B4: AWS SES for budget-alert email. The
      # evaluate_budgets task runs in THIS worker and calls
      # notify.send_email; the gateway/beat never send, so the SES
      # vars live only here. OGMA_ALERT_FROM_ADDRESS unset → the
      # email module raises SesNotConfigured, the evaluator catches
      # + logs, the alert still records (dashboard is source of
      # truth). boto3 reads AWS_ACCESS_KEY_ID/SECRET from its default
      # credential chain — they must be in the env for it to find
      # them. See docs/ops/integrations/aws-ses.md.
      OGMA_ALERT_FROM_ADDRESS: ${OGMA_ALERT_FROM_ADDRESS:-}
      AWS_SES_REGION: ${AWS_SES_REGION:-eu-west-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      OGMA_DASHBOARD_URL: ${OGMA_DASHBOARD_URL:-https://ogma.vargate.ai}
    volumes:
      - vargate-hsm-tokens:/var/lib/softhsm/tokens
      - vargate-prom-multiproc:/tmp/prometheus_multiproc
    networks:
      - telemetry_internal
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # T4.2: FastAPI gateway. Same image as the celery containers, different
  # command. nginx in prod routes vargate.ai/api/* here and strips the
  # `/api/` prefix; the FastAPI app has `root_path="/api"` to match.
  gateway:
    build:
      context: .
      # Same SSH-agent forwarding need as the celery services — pip
      # has to clone vargate-audit-chain from the private proxy repo.
      ssh:
        - default
    image: vargate-telemetry:dev
    restart: unless-stopped
    command:
      - uvicorn
      - vargate_telemetry.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:-}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:-}
      OGMA_OAUTH_REDIRECT_BASE: ${OGMA_OAUTH_REDIRECT_BASE:-https://vargate.ai}
      OGMA_CORS_ORIGINS: ${OGMA_CORS_ORIGINS:-http://localhost:5173}
      # T4.5: `/onboarding/select-region` provisions a per-tenant DEK
      # (generate → wrap-at-HSM → store) in the same transaction it
      # INSERTs `tenants`. The gateway therefore needs the HSM
      # credentials and the SoftHSM2 token volume just like the
      # celery workers that seal/unseal during ingest.
      PKCS11_MODULE: ${PKCS11_MODULE}
      HSM_TOKEN_LABEL: ${HSM_TOKEN_LABEL}
      HSM_KEK_LABEL: ${HSM_KEK_LABEL}
      HSM_PIN: ${HSM_PIN}
      HSM_SO_PIN: ${HSM_SO_PIN}
      # T4.6: `/onboarding/start-backfill` enqueues a Celery task and
      # `/onboarding/backfill-status` reads task state from the result
      # backend. The gateway therefore imports `celery_app`, which
      # reads these at module import time — they must be set even
      # though the gateway never runs a worker itself.
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      # T4.8.1: shared multiproc dir for prometheus_client. The /metrics
      # route in `vargate_telemetry.api.app` builds a fresh registry
      # backed by `MultiProcessCollector`, which reads files from this
      # dir to aggregate observations emitted by celery-worker (where
      # the backfill task observes time-to-first-pull) and the gateway
      # itself (validate-key / select-region / start-backfill step
      # histograms). Without this dir + the matching volume mount, the
      # worker's observations land in its own in-process REGISTRY and
      # are invisible to any scrape — the structural gap T4.8 found.
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      # T5.0: object-store wrapper config. The gateway itself doesn't
      # currently call the storage layer (writes happen in worker
      # tasks), but onboarding diagnostics and future read paths
      # (T5.x dashboard content views) will. Same env wired here so
      # the gateway can construct the boto3 client on demand.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_TENANT_CONTENT_BUCKET: ${MINIO_TENANT_CONTENT_BUCKET:-tenant-content}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # TM2 Phase A2: bridge JWT keypair. Gateway signs short-lived (60s)
      # JWTs with this ES256 key; the MCP server fetches the public form
      # via /.well-known/ogma-public-key.json. The container-side path
      # is constant; the host-side path is configurable so prod can mount
      # /home/vargate/secrets/... while dev uses ops/dev-secrets/.
      OGMA_BRIDGE_JWT_PRIVATE_KEY_PATH: /run/secrets/bridge_jwt_private.pem
      OGMA_BRIDGE_JWT_KID: ${OGMA_BRIDGE_JWT_KID:-ogma-bridge-v1}
    volumes:
      - vargate-hsm-tokens:/var/lib/softhsm/tokens
      - vargate-prom-multiproc:/tmp/prometheus_multiproc
      # TM2 Phase A2: bind-mount the bridge JWT private key, read-only.
      # Default points at ops/dev-secrets/ (gitignored, generated by
      # scripts/generate_bridge_jwt_keypair.py); prod overrides via
      # OGMA_BRIDGE_JWT_PRIVATE_KEY_HOST_PATH to /home/vargate/secrets/.
      - ${OGMA_BRIDGE_JWT_PRIVATE_KEY_HOST_PATH:-./ops/dev-secrets/bridge_jwt_private.pem}:/run/secrets/bridge_jwt_private.pem:ro
    # T4.7.1: gateway sits on BOTH networks. `telemetry_internal` for
    # in-stack DNS to postgres/redis/etc; `tyr_observability` so Tyr's
    # Prometheus can scrape `/metrics` from across the project boundary.
    #
    # Custom alias `ogma-gateway` on the shared network avoids a DNS
    # collision: the Tyr stack also registers `gateway` as an alias for
    # its own proxy container on `vargate_default`, and Docker's
    # embedded DNS refuses to disambiguate duplicate aliases (returns
    # NXDOMAIN instead of picking one). Prometheus scrapes
    # `ogma-gateway:8000` to address Ogma unambiguously.
    networks:
      telemetry_internal: {}
      tyr_observability:
        aliases:
          - ogma-gateway
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/_health', timeout=3).status == 200 else 1)"
      interval: 15s
      retries: 5
      start_period: 20s

  celery-beat:
    build:
      context: .
      # See celery-worker.build.ssh — same image, same SSH-at-build need.
      ssh:
        - default
    image: vargate-telemetry:dev
    restart: unless-stopped
    command:
      - celery
      - -A
      - vargate_telemetry.celery_app
      - beat
      - --loglevel=info
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL}
      PKCS11_MODULE: ${PKCS11_MODULE}
      HSM_TOKEN_LABEL: ${HSM_TOKEN_LABEL}
      HSM_KEK_LABEL: ${HSM_KEK_LABEL}
      HSM_PIN: ${HSM_PIN}
      HSM_SO_PIN: ${HSM_SO_PIN}
      STRIPE_API_KEY_TEST: ${STRIPE_API_KEY_TEST:-}
      VARGATE_REGION: ${VARGATE_REGION:-us}
      ANTHROPIC_ADMIN_KEY_TEST: ${ANTHROPIC_ADMIN_KEY_TEST:-}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:-}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:-}
      OGMA_OAUTH_REDIRECT_BASE: ${OGMA_OAUTH_REDIRECT_BASE:-https://vargate.ai}
      OGMA_CORS_ORIGINS: ${OGMA_CORS_ORIGINS:-http://localhost:5173}
      # T4.8.1: same shared multiproc dir as gateway + celery-worker. Beat
      # itself doesn't emit metrics today (the schedule fan-out is a
      # plain Celery dispatch with no histogram observation), but joining
      # the volume now means the first beat-emitted instrument lands
      # without a follow-up compose edit. Cheap to include.
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    volumes:
      - vargate-hsm-tokens:/var/lib/softhsm/tokens
      - vargate-prom-multiproc:/tmp/prometheus_multiproc
    networks:
      - telemetry_internal
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # TM1: Ogma MCP connector server. Separate process, separate
  # container, shares postgres + redis + the celery worker pool
  # with the rest of the Telemetry stack. Reuses the
  # `vargate-telemetry:dev` image (built by the `gateway` service)
  # because the MCP-server code lives inside the same package tree.
  #
  # Routed by nginx at mcp.ogma.vargate.ai → 127.0.0.1:8002 (prod
  # overlay binds the host port; dev only exposes within the
  # Docker network).
  mcp-server:
    build:
      context: .
      ssh:
        - default
    image: vargate-telemetry:dev
    restart: unless-stopped
    command:
      - uvicorn
      - mcp_server.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # MCP server URL — used as the OAuth issuer + the RFC 8707
      # resource indicator. Defaults to https://mcp.ogma.vargate.ai
      # in prod; localhost for dev runs.
      MCP_SERVER_URL: ${MCP_SERVER_URL:-https://mcp.ogma.vargate.ai}
      # Spike-mode gate. Set MCP_SPIKE_MODE=true ONLY for the TM1
      # feasibility test. Production builds (TM2+) must build the
      # SSO bridge described in TM1 §10 and remove this var.
      MCP_SPIKE_MODE: ${MCP_SPIKE_MODE:-}
      MCP_TEST_IDENTITY_TENANT_ID: ${MCP_TEST_IDENTITY_TENANT_ID:-}
      MCP_TEST_IDENTITY_USER_ID: ${MCP_TEST_IDENTITY_USER_ID:-}
      MCP_TEST_IDENTITY_USER_EMAIL: ${MCP_TEST_IDENTITY_USER_EMAIL:-}
      # Celery — the MCP server enqueues persist_event tasks via
      # the same broker as the rest of Telemetry.
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      # HSM env is loaded so the audit-chain append (called inside
      # the celery task, not in-process here) can wrap/unwrap; the
      # MCP server itself doesn't touch the HSM, but `chain.py`
      # imports it module-load.
      PKCS11_MODULE: ${PKCS11_MODULE}
      HSM_TOKEN_LABEL: ${HSM_TOKEN_LABEL}
      HSM_KEK_LABEL: ${HSM_KEK_LABEL}
      HSM_PIN: ${HSM_PIN}
      HSM_SO_PIN: ${HSM_SO_PIN}
    volumes:
      - vargate-hsm-tokens:/var/lib/softhsm/tokens
    networks:
      - telemetry_internal
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/_health', timeout=3).status == 200 else 1)"
      interval: 15s
      retries: 5
      start_period: 20s

# T4.7.1: explicit network model. See header comment for the
# `tyr_observability` env-var override (dev defaults to vargate_default).
networks:
  telemetry_internal:
    driver: bridge
  tyr_observability:
    external: true
    name: ${TYR_OBSERVABILITY_NETWORK:-vargate_default}

volumes:
  vargate-postgres-data:
    name: vargate-postgres-data
  vargate-minio-data:
    name: vargate-minio-data
  vargate-redis-data:
    name: vargate-redis-data
  vargate-hsm-tokens:
    name: vargate-hsm-tokens
  # T4.8.1: shared multiproc dir for prometheus_client. tmpfs-backed
  # so writes are in-RAM (the multiproc files are small but write-heavy
  # — every Counter/Histogram observation does a file mmap update).
  # All three Python-running services (gateway, celery-worker,
  # celery-beat) mount this at /tmp/prometheus_multiproc so the
  # gateway's /metrics route can aggregate observations across them.
  #
  # Linux-only: the `tmpfs` driver_opts work on the local driver on
  # Linux hosts. Docker Desktop on macOS doesn't honor the same
  # driver_opts shape — fine for now, prod box is Linux and dev box
  # is Linux. If anyone develops on macOS, drop the `driver_opts`
  # block and accept disk-backed multiproc files (still correct, just
  # slower).
  #
  # Safe to `docker compose down` (volume persists, counter values
  # survive); destroyed by `docker compose down -v` along with
  # everything else (which is why CLAUDE.md says never run -v).
  vargate-prom-multiproc:
    name: vargate-prom-multiproc
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=16m"
