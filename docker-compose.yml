# Vargate Telemetry — dev compose stack.
#
# This is the dev-only stack used while iterating locally. The production
# overlay (`docker-compose.prod.yml`, internal-only networking, restart
# policies, resource limits) lands in T1.9.
#
# Subsequent T1.x sprints append their services to this file:
#   - T1.2 adds MinIO
#   - T1.3 adds celery-worker + celery-beat
#   - T1.4+ adds the Telemetry FastAPI gateway

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - vargate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    volumes:
      - vargate-minio-data:/data
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      interval: 10s
      retries: 5

volumes:
  vargate-postgres-data:
    name: vargate-postgres-data
  vargate-minio-data:
    name: vargate-minio-data
